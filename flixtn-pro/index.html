          <div className="fg"><label className="fl">تأكيد كلمة المرور</label><input className="fi" type="password" value={pwdF.confirm} onChange={e=>setPwdF(p=>({...p,confirm:e.target.value}))} placeholder="••••••••" /></div>
          <button className="btn-auth" onClick={changePwd} disabled={saving}>{saving?<span style={{display:'flex',alignItems:'center',justifyContent:'center',gap:'.4rem'}}><Spin sm />جاري...</span>:'🔒 تغيير'}</button>
        </div>
      )}
    </div>
  );
}

/* ═══════════ ADMIN — CONTENT FORM ═══════════════════════ */
function ContentFormModal({ item, onClose, onSaved, showToast }) {
  const isNew = !item?.id;
  const [type, setType] = useState(item?.type||'movie');
  const [saving, setSaving] = useState(false);
  const [err, setErr] = useState('');
  const [f, setF] = useState({
    title: item?.title||'', title_en: item?.title_en||'',
    year: item?.year||new Date().getFullYear(), rating: item?.rating||7.5,
    genre: (item?.genre||[]).join('، '), category: item?.category||'international',
    poster_url: item?.poster_url||item?.poster||'', backdrop_url: item?.backdrop_url||item?.backdrop||'',
    description: item?.description||'', description_en: item?.description_en||'',
    cast_list: (item?.cast_list||[]).join('، '),
    director: item?.director||'', duration: item?.duration||'',
    video_url: item?.video_url||'', trailer_url: item?.trailer_url||'',
    is_featured: item?.is_featured||false, is_trending: item?.is_trending||false, match_pct: item?.match_pct||90,
  });
  const inp = (k,v) => setF(p=>({...p,[k]:v}));
  const [selGenres, setSelGenres] = useState(item?.genre||[]);
  const toggleGenre = (g) => {
    const en = GENRE_MAP_EN[g]||g;
    setSelGenres(prev => {
      const has = prev.includes(g)||prev.includes(en);
      const next = has ? prev.filter(x=>x!==g&&x!==en) : [...prev,g];
      setF(p=>({...p,genre:next.join('، ')}));
      return next;
    });
  };

  const save = async () => {
    if (!f.title.trim()) { setErr('العنوان مطلوب'); return; }
    setSaving(true); setErr('');
    const payload = {
      type, ...f,
      year: parseInt(f.year)||new Date().getFullYear(),
      rating: parseFloat(f.rating)||7.0,
      genre: selGenres.length > 0 ? selGenres : f.genre.split(/[,،]/).map(x=>x.trim()).filter(Boolean),
      cast_list: f.cast_list.split(/[,،]/).map(x=>x.trim()).filter(Boolean),
      poster_url: f.poster_url||`https://picsum.photos/seed/${Date.now()}/300/450`,
      backdrop_url: f.backdrop_url||`https://picsum.photos/seed/${Date.now()}b/1280/720`,
    };
    try {
      const saved = isNew ? await DB.createContent(payload) : await DB.updateContent(item.id, payload);
      showToast(isNew?'✓ تمت الإضافة':'✓ تم الحفظ');
      onSaved(saved);
    } catch (e) { setErr(e.message); }
    setSaving(false);
  };

  return (
    <div className="modal-bd" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal-box">
        <div className="modal-hd">
          <h3>{isNew?`➕ ${type==='movie'?'فيلم جديد':'مسلسل جديد'}`:`✏ تعديل: ${item.title}`}</h3>
          <button className="modal-x" onClick={onClose}>✕</button>
        </div>
        {isNew && (
          <div style={{ display:'flex',gap:'.5rem',marginBottom:'1rem' }}>
            {['movie','series'].map(t=><div key={t} className={`chip ${type===t?'a':''}`} onClick={()=>setType(t)}>{t==='movie'?'🎬 فيلم':'📺 مسلسل'}</div>)}
          </div>
        )}
        {err && <div className="ferr">⚠ {err}</div>}
        <div className="form-grid">
          <div className="fg"><label className="fl">العنوان العربي *</label><input className="fi fi-r" value={f.title} onChange={e=>inp('title',e.target.value)} placeholder="عنوان الفيلم" /></div>
          <div className="fg"><label className="fl">English Title</label><input className="fi" value={f.title_en} onChange={e=>inp('title_en',e.target.value)} placeholder="Movie Title" /></div>
          <div className="fg"><label className="fl">السنة</label><input className="fi" value={f.year} onChange={e=>inp('year',e.target.value)} /></div>
          <div className="fg"><label className="fl">التقييم (0-10)</label><input className="fi" value={f.rating} onChange={e=>inp('rating',e.target.value)} /></div>
          <div className="fg"><label className="fl">المنطقة</label>
            <select className="fsel" value={f.category} onChange={e=>inp('category',e.target.value)}>
              <option value="arabic">🇸🇦 عربي</option>
              <option value="tunisian">🇹🇳 تونسي</option>
              <option value="international">🌍 عالمي</option>
            </select>
          </div>
          {type==='movie'&&<div className="fg"><label className="fl">المدة</label><input className="fi" value={f.duration} onChange={e=>inp('duration',e.target.value)} placeholder="2س 15د" /></div>}
          <div className="fg form-full">
            <label className="fl">التصنيفات</label>
            <div style={{ display:'flex',gap:'.4rem',flexWrap:'wrap',marginTop:'.3rem' }}>
              {GENRES.filter(g=>g!=='الكل').map(g=>(
                <div key={g} onClick={()=>toggleGenre(g)}
                  style={{ padding:'.3rem .8rem',borderRadius:20,fontSize:'.72rem',cursor:'pointer',border:'1px solid',transition:'all .2s',
                    background: selGenres.includes(g)||selGenres.includes(GENRE_MAP_EN[g]) ? 'var(--red)' : 'var(--s2)',
                    borderColor: selGenres.includes(g)||selGenres.includes(GENRE_MAP_EN[g]) ? 'var(--red)' : 'var(--s3)',
                    color: selGenres.includes(g)||selGenres.includes(GENRE_MAP_EN[g]) ? '#fff' : 'var(--t3)' }}>
                  {g}
                </div>
              ))}
            </div>
          </div>
          <div className="fg"><label className="fl">المخرج</label><input className="fi fi-r" value={f.director} onChange={e=>inp('director',e.target.value)} /></div>
          <div className="fg"><label className="fl">طاقم التمثيل (بفاصلة)</label><input className="fi fi-r" value={f.cast_list} onChange={e=>inp('cast_list',e.target.value)} /></div>
          {type==='movie'&&<div className="fg form-full"><label className="fl">🔗 رابط الفيديو</label><input className="fi" value={f.video_url} onChange={e=>inp('video_url',e.target.value)} placeholder="https://youtube.com/watch?v=..." /></div>}
          <div className="fg"><label className="fl">رابط البوستر</label><input className="fi" value={f.poster_url} onChange={e=>inp('poster_url',e.target.value)} /></div>
          <div className="fg"><label className="fl">رابط الخلفية</label><input className="fi" value={f.backdrop_url} onChange={e=>inp('backdrop_url',e.target.value)} /></div>
          <div className="fg form-full"><label className="fl">الوصف العربي</label><textarea className="ftarea" value={f.description} onChange={e=>inp('description',e.target.value)} placeholder="وصف الفيلم بالعربية..." /></div>
          <div className="fg form-full"><label className="fl">English Description</label><textarea className="ftarea" style={{ direction:'ltr',textAlign:'left' }} value={f.description_en} onChange={e=>inp('description_en',e.target.value)} placeholder="Movie description in English..." /></div>
          <div className="fg form-full">
            <div className="fcheck-row">
              <label className="fcheck"><input type="checkbox" checked={f.is_featured} onChange={e=>inp('is_featured',e.target.checked)} /> ⭐ مميز في الرئيسية</label>
              <label className="fcheck"><input type="checkbox" checked={f.is_trending} onChange={e=>inp('is_trending',e.target.checked)} /> 🔥 رائج</label>
            </div>
          </div>
        </div>
        <div style={{ display:'flex',gap:'.7rem',marginTop:'1.2rem' }}>
          <button onClick={save} disabled={saving} className="btn-play" style={{ fontSize:'.82rem' }}>
            {saving?<span style={{display:'flex',gap:'.4rem',alignItems:'center'}}><Spin sm />جاري...</span>:'💾 حفظ'}
          </button>
          <button onClick={onClose} style={{ padding:'.6rem 1.1rem',background:'var(--s2)',border:'1px solid var(--s3)',borderRadius:8,color:'var(--t2)',cursor:'pointer',fontFamily:"'Cairo',sans-serif",fontSize:'.82rem' }}>إلغاء</button>
        </div>
      </div>
    </div>
  );
}

/* ═══════════ ADMIN — SEASONS MANAGER (FULL) ══════════════ */
function SeasonsModal({ series, onClose, showToast }) {
  const [seasons, setSeasons]     = useState([]);
  const [selS, setSelS]           = useState(0);
  const [newSTitle, setNewSTitle] = useState('');
  const [addingEp, setAddingEp]   = useState(false);
  const [editingEp, setEditingEp] = useState(null);
  const [loading, setLoading]     = useState(false);
  const [loadingFull, setLoadingFull] = useState(true);
  const [epF, setEpF] = useState({ title:'',ep_num:1,description:'',duration:'',thumb_url:'',video_url:'' });

  // Load fresh data with episodes
  useEffect(() => {
    DB.getContent(series.id).then(d => {
      setSeasons(d?.seasons||[]);
      setLoadingFull(false);
    });
  }, [series.id]);

  const addSeason = async () => {
    if (!newSTitle.trim()) return;
    setLoading(true);
    try {
      const s = await DB.createSeason(series.id, newSTitle.trim(), seasons.length+1);
      setSeasons(p=>[...p,s]); setNewSTitle(''); setSelS(seasons.length);
      showToast('✓ تم إضافة الموسم');
    } catch(e) { showToast('خطأ: '+e.message); }
    setLoading(false);
  };

  const delSeason = async (sid) => {
    if (!window.confirm('حذف هذا الموسم وكل حلقاته؟')) return;
    await DB.deleteSeason(sid);
    const updated = seasons.filter(s=>s.id!==sid);
    setSeasons(updated); setSelS(0);
    showToast('تم حذف الموسم');
  };

  const addEp = async () => {
    if (!epF.title.trim()||seasons.length===0) return;
    setLoading(true);
    try {
      const epCount = seasons[selS]?.episodes?.length||0;
      const ep = await DB.createEpisode(seasons[selS].id, series.id, {
        ...epF, ep_num: parseInt(epF.ep_num)||epCount+1
      });
      setSeasons(p=>p.map((s,i)=>i===selS?{...s,episodes:[...(s.episodes||[]),ep]}:s));
      setEpF({title:'',ep_num:(epCount+2),description:'',duration:'',thumb_url:'',video_url:''});
      setAddingEp(false);
      showToast('✓ تمت إضافة الحلقة');
    } catch(e) { showToast('خطأ: '+e.message); }
    setLoading(false);
  };

  const saveEp = async (ep, updates) => {
    setLoading(true);
    try {
      const updated = await DB.updateEpisode(ep.id, updates);
      setSeasons(p=>p.map((s,i)=>i===selS?{...s,episodes:s.episodes.map(e=>e.id===ep.id?updated:e)}:s));
      setEditingEp(null);
      showToast('✓ تم حفظ الحلقة');
    } catch(e) { showToast('خطأ: '+e.message); }
    setLoading(false);
  };

  const delEp = async (epId) => {
    await DB.deleteEpisode(epId);
    setSeasons(p=>p.map((s,i)=>i===selS?{...s,episodes:s.episodes.filter(e=>e.id!==epId)}:s));
    showToast('تم حذف الحلقة');
  };

  if (loadingFull) return (
    <div className="modal-bd"><div className="modal-box" style={{ textAlign:'center',padding:'3rem' }}><Spin /></div></div>
  );

  const curEps = seasons[selS]?.episodes||[];

  return (
    <div className="modal-bd" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal-box" style={{ maxWidth:820 }}>
        <div className="modal-hd">
          <h3>📺 مواسم وحلقات: {series.title}</h3>
          <button className="modal-x" onClick={onClose}>✕</button>
        </div>

        {/* Add season */}
        <div style={{ display:'flex',gap:'.6rem',marginBottom:'1.2rem' }}>
          <input className="fi fi-r" style={{ flex:1 }} value={newSTitle} onChange={e=>setNewSTitle(e.target.value)}
            placeholder="اسم الموسم — مثال: الموسم الأول" onKeyDown={e=>e.key==='Enter'&&addSeason()} />
          <button onClick={addSeason} disabled={loading} className="btn-play" style={{ fontSize:'.8rem',padding:'.6rem 1.2rem',whiteSpace:'nowrap' }}>
            {loading?<Spin sm />:'+ إضافة موسم'}
          </button>
        </div>

        {seasons.length === 0 && (
          <div style={{ padding:'2rem',textAlign:'center',color:'var(--t4)',background:'var(--bg3)',borderRadius:8,border:'1px dashed var(--s3)',fontSize:'.82rem' }}>
            لا توجد مواسم بعد — أضف موسماً أولاً ⬆
          </div>
        )}

        {seasons.length > 0 && (
          <>
            {/* Season tabs */}
            <div className="season-tabs">
              {seasons.map((s,i)=>(
                <div key={s.id} style={{ display:'flex',alignItems:'center',gap:'.2rem' }}>
                  <button className={`s-tab ${selS===i?'a':''}`} onClick={()=>setSelS(i)}>
                    {s.title} <span style={{ opacity:.65,fontSize:'.63rem' }}>({s.episodes?.length||0} حلقة)</span>
                  </button>
                  <button onClick={()=>delSeason(s.id)} style={{ background:'none',border:'none',color:'var(--red3)',cursor:'pointer',fontSize:'.8rem',padding:'.2rem',opacity:.6 }}>🗑</button>
                </div>
              ))}
            </div>

            {/* Header */}
            <div style={{ display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'.9rem',padding:'.5rem 0',borderBottom:'1px solid var(--s2)' }}>
              <div style={{ fontWeight:700,fontSize:'.85rem',color:'var(--t2)' }}>
                {seasons[selS]?.title} — {curEps.length} حلقة
              </div>
              <button onClick={()=>{setAddingEp(true);setEpF(p=>({...p,ep_num:curEps.length+1}));}} className="a-btn a-grn" style={{ fontSize:'.78rem',padding:'.4rem .9rem' }}>
                ➕ إضافة حلقة جديدة
              </button>
            </div>

            {/* ADD EPISODE FORM */}
            {addingEp && (
              <div style={{ background:'var(--bg3)',border:'1px solid var(--red)',borderRadius:10,padding:'1.2rem',marginBottom:'1rem' }}>
                <div style={{ fontFamily:"'Oswald',sans-serif",fontSize:'.85rem',fontWeight:600,marginBottom:'.9rem',color:'var(--red3)' }}>
                  ➕ حلقة جديدة في: {seasons[selS]?.title}
                </div>
                <div className="form-grid">
                  <div className="fg"><label className="fl">عنوان الحلقة *</label><input className="fi fi-r" value={epF.title} onChange={e=>setEpF(p=>({...p,title:e.target.value}))} placeholder="مثال: الحلقة الأولى" /></div>
                  <div className="fg"><label className="fl">رقم الحلقة</label><input className="fi" type="number" min="1" value={epF.ep_num} onChange={e=>setEpF(p=>({...p,ep_num:e.target.value}))} /></div>
                  <div className="fg form-full">
                    <label className="fl">🔗 رابط الفيديو (YouTube, Dailymotion, MP4...)</label>
                    <input className="fi" value={epF.video_url} onChange={e=>setEpF(p=>({...p,video_url:e.target.value}))} placeholder="https://www.youtube.com/watch?v=XXXXXXXXXXX" />
                    {epF.video_url && <div style={{ fontSize:'.65rem',color:'var(--green)',marginTop:'.3rem' }}>✓ رابط مُدخَل: {epF.video_url.slice(0,50)}...</div>}
                  </div>
                  <div className="fg"><label className="fl">المدة</label><input className="fi" value={epF.duration} onChange={e=>setEpF(p=>({...p,duration:e.target.value}))} placeholder="45د" /></div>
                  <div className="fg"><label className="fl">صورة مصغرة (اختياري)</label><input className="fi" value={epF.thumb_url} onChange={e=>setEpF(p=>({...p,thumb_url:e.target.value}))} placeholder="https://..." /></div>
                  <div className="fg form-full"><label className="fl">الوصف (اختياري)</label><input className="fi fi-r" value={epF.description} onChange={e=>setEpF(p=>({...p,description:e.target.value}))} /></div>
                </div>
                <div style={{ display:'flex',gap:'.6rem',marginTop:'.5rem' }}>
                  <button onClick={addEp} disabled={loading} className="btn-play" style={{ fontSize:'.8rem',padding:'.6rem 1.2rem' }}>
                    {loading?<Spin sm />:'💾 حفظ الحلقة'}
                  </button>
                  <button onClick={()=>setAddingEp(false)} style={{ padding:'.6rem 1rem',background:'var(--s2)',border:'1px solid var(--s3)',borderRadius:7,color:'var(--t2)',cursor:'pointer',fontFamily:"'Cairo',sans-serif",fontSize:'.8rem' }}>إلغاء</button>
                </div>
              </div>
            )}

            {/* EPISODES LIST */}
            {curEps.length === 0 && !addingEp && (
              <div style={{ padding:'1.5rem',textAlign:'center',color:'var(--t4)',fontSize:'.82rem',background:'var(--bg3)',borderRadius:8,border:'1px dashed var(--s3)' }}>
                لا توجد حلقات في هذا الموسم — اضغط "إضافة حلقة جديدة" ⬆
              </div>
            )}

            {curEps.map((ep,i)=>(
              <div key={ep.id}>
                {editingEp?.id === ep.id ? (
                  <EpEditInline ep={ep} onSave={u=>saveEp(ep,u)} onCancel={()=>setEditingEp(null)} loading={loading} />
                ) : (
                  <div style={{ display:'flex',alignItems:'center',gap:'.8rem',padding:'.8rem .9rem',background:'var(--bg3)',border:'1px solid var(--s2)',borderRadius:9,marginBottom:'.5rem' }}>
                    <span style={{ fontFamily:"'Oswald',sans-serif",fontSize:'1.3rem',fontWeight:700,color:'var(--t4)',width:28,textAlign:'center',flexShrink:0 }}>{ep.ep_num||i+1}</span>
                    {ep.thumb_url
                      ? <img src={ep.thumb_url} alt="" style={{ width:80,height:46,objectFit:'cover',borderRadius:5,flexShrink:0 }} />
                      : <div style={{ width:80,height:46,background:'var(--s2)',borderRadius:5,display:'flex',alignItems:'center',justifyContent:'center',color:'var(--t4)',flexShrink:0,fontSize:'.9rem' }}>▶</div>}
                    <div style={{ flex:1,minWidth:0 }}>
                      <div style={{ fontWeight:700,fontSize:'.83rem' }}>{ep.title}</div>
                      <div style={{ fontSize:'.7rem',color:'var(--t3)',marginTop:'.15rem',display:'flex',gap:'.6rem',flexWrap:'wrap' }}>
                        {ep.duration && <span>⏱ {ep.duration}</span>}
                        {ep.video_url
                          ? <span style={{ color:'var(--green)' }}>✓ رابط: {ep.video_url.slice(0,35)}...</span>
                          : <span style={{ color:'var(--red3)' }}>⚠ لا يوجد رابط فيديو</span>}
                      </div>
                    </div>
                    <div style={{ display:'flex',gap:'.35rem',flexShrink:0 }}>
                      <button onClick={()=>setEditingEp(ep)} className="a-btn a-edit">تعديل</button>

                    </div>
                  </div>
                )}
              </div>
            ))}
          </>
        )}
      </div>
    </div>
  );
}

/* ═══════════ BROWSE PAGE ════════════════════════════════ */
function BrowsePage({ movies, series, loading, onItemClick, user, favorites, onFavToggle }) {
  const [genre, setGenre] = useState('الكل');
  const [region, setRegion] = useState('الكل');
  const [type, setType] = useState('الكل');
  const [sort, setSort] = useState('newest');
  const [q, setQ] = useState('');
  const favIds = new Set(favorites.map(f => f.content_id));
  const regionMap = { 'عربي':'arabic','تونسي':'tunisian','عالمي':'international' };

  let all = [...movies, ...series];
  if (type !== 'الكل') all = all.filter(x => x.type === (type==='أفلام'?'movie':'series'));
  if (region !== 'الكل') all = all.filter(x => x.category === regionMap[region]);
  if (genre !== 'الكل') all = all.filter(x => x.genre?.some(g => g===genre || g===GENRE_MAP_EN[genre] || (GENRE_MAP_EN[genre]||'').toLowerCase()===g.toLowerCase()));
  if (q.trim()) { const lq=q.toLowerCase(); all = all.filter(x => x.title?.toLowerCase().includes(lq)||x.title_en?.toLowerCase().includes(lq)); }
  if (sort==='rating') all=[...all].sort((a,b)=>(b.rating||0)-(a.rating||0));
  else if (sort==='year') all=[...all].sort((a,b)=>(b.year||0)-(a.year||0));
  else all=[...all].sort((a,b)=>new Date(b.created_at||0)-new Date(a.created_at||0));

  return (
    <div>
      {/* Hero banner */}
      <div className="browse-hero">
        <div style={{ position:'relative',zIndex:1 }}>
          <div className="browse-title">تصفح المحتوى</div>
          <div style={{ fontSize:'.85rem',color:'var(--t3)',marginBottom:'1.5rem' }}>{all.length} عنوان متاح</div>
          {/* Search */}
          <div style={{ maxWidth:480,margin:'0 auto',display:'flex',alignItems:'center',gap:'.7rem',background:'rgba(255,255,255,.06)',border:'1px solid rgba(255,255,255,.12)',borderRadius:12,padding:'.7rem 1.1rem' }}>
            <span style={{ opacity:.5,fontSize:'1.1rem' }}>🔍</span>
            <input value={q} onChange={e=>setQ(e.target.value)} placeholder="ابحث عن فيلم أو مسلسل..."
              style={{ flex:1,background:'none',border:'none',color:'var(--t1)',fontFamily:"'Cairo',sans-serif",fontSize:'.9rem',outline:'none',direction:'rtl' }} />
          </div>
        </div>
      </div>

      <div style={{ padding:'1.5rem 3rem 3rem',maxWidth:1500,margin:'0 auto' }}>
        {/* Filters */}
        <div style={{ display:'flex',gap:'1.5rem',flexWrap:'wrap',marginBottom:'1.5rem',paddingBottom:'1.2rem',borderBottom:'1px solid var(--s2)' }}>
          <div>
            <div style={{ fontSize:'.6rem',color:'var(--t4)',fontWeight:700,letterSpacing:'1px',textTransform:'uppercase',marginBottom:'.45rem' }}>النوع</div>
            <div style={{ display:'flex',gap:'.35rem' }}>
              {['الكل','أفلام','مسلسلات'].map(t=><div key={t} className={`chip ${type===t?'a':''}`} onClick={()=>setType(t)} style={{ fontSize:'.7rem' }}>{t}</div>)}
            </div>
          </div>
          <div>
            <div style={{ fontSize:'.6rem',color:'var(--t4)',fontWeight:700,letterSpacing:'1px',textTransform:'uppercase',marginBottom:'.45rem' }}>المنطقة</div>
            <div style={{ display:'flex',gap:'.35rem' }}>
              {['الكل','عربي','تونسي','عالمي'].map(r=><div key={r} className={`chip ${region===r?'a':''}`} onClick={()=>setRegion(r)} style={{ fontSize:'.7rem' }}>{r}</div>)}
            </div>
          </div>
          <div>
            <div style={{ fontSize:'.6rem',color:'var(--t4)',fontWeight:700,letterSpacing:'1px',textTransform:'uppercase',marginBottom:'.45rem' }}>التصنيف</div>
            <div style={{ display:'flex',gap:'.35rem',flexWrap:'wrap',maxWidth:600 }}>
              {GENRES.map(g=><div key={g} className={`chip ${genre===g?'a':''}`} onClick={()=>setGenre(g)} style={{ fontSize:'.68rem' }}>{g}</div>)}
            </div>
          </div>
          <div style={{ marginRight:'auto' }}>
            <div style={{ fontSize:'.6rem',color:'var(--t4)',fontWeight:700,letterSpacing:'1px',textTransform:'uppercase',marginBottom:'.45rem' }}>ترتيب</div>
            <div style={{ display:'flex',gap:'.35rem' }}>
              {[['newest','الأحدث'],['rating','التقييم'],['year','السنة']].map(([k,l])=><div key={k} className={`chip ${sort===k?'a':''}`} onClick={()=>setSort(k)} style={{ fontSize:'.7rem' }}>{l}</div>)}
            </div>
          </div>
        </div>

        {/* Results count */}
        <div style={{ fontSize:'.75rem',color:'var(--t4)',marginBottom:'1.2rem' }}>
          {all.length} نتيجة {q&&`لـ "${q}"`}
        </div>

        {loading
          ? <div className="c-grid">{Array.from({length:18}).map((_,i)=><div key={i} className="skel" style={{height:243,borderRadius:12}}/>)}</div>
          : all.length===0
            ? <div style={{ padding:'4rem',textAlign:'center',color:'var(--t4)' }}><div style={{ fontSize:'4rem',opacity:.1,marginBottom:'1rem' }}>🎬</div><div>لا توجد نتائج</div></div>
            : <div className="c-grid">{all.map(it=><MovieCard key={it.id} item={it} onClick={onItemClick} showType onFav={user?onFavToggle:null} isFav={favIds.has(it.id)} />)}</div>}
      </div>
    </div>
  );
}

/* ═══════════ DETAIL PAGE ════════════════════════════════ */
function DetailPage({ itemId, onPlay, onBack, user, profile, favorites, onFavToggle, onSelectEp }) {
  const [item, setItem] = useState(null);
  const [loading, setLoading] = useState(true);
  const [season, setSeason] = useState(0);

  const favIds = new Set(favorites.map(f => f.content_id));

  useEffect(() => {
    setLoading(true); setSeason(0);
    DB.getContent(itemId).then(d => { setItem(d); setLoading(false); }).catch(() => setLoading(false));

  const isSeries = item.type === 'series';
  const isFav = favIds.has(item.id);
  const seasons = item.seasons || [];
  const catLabel = { arabic:'🇸🇦 عربي', tunisian:'🇹🇳 تونسي', international:'🌍 عالمي' }[item.category] || '';

  return (
    <div>
      {/* Hero */}
      <div className="det-hero">
        <div className="det-bg"><img src={item.backdrop_url || item.poster_url} alt={item.title} /></div>
        <div className="det-ov" />
        <div style={{ position:'absolute',inset:0,background:'linear-gradient(to left,transparent 40%,rgba(6,6,8,.7) 100%)' }} />
        <div className="det-c">
          <div style={{ display:'flex',gap:'.5rem',flexWrap:'wrap',marginBottom:'.8rem' }}>

          </div>
          <h1 className="det-title">{item.title_en || item.title}</h1>
          {item.title_en && item.title && (
            <div style={{fontFamily:"'Cairo',sans-serif",fontSize:'1rem',color:'rgba(200,200,224,.65)',marginBottom:'.5rem',fontWeight:400}}>
              {item.title}
            </div>
          )}
          <div style={{ display:'flex',gap:'.8rem',alignItems:'center',flexWrap:'wrap',fontSize:'.8rem',marginBottom:'1.2rem' }}>
            <span style={{ color:'#f5c518',fontWeight:700 }}>★ {item.rating}</span>
            <span style={{ color:'var(--t4)' }}>·</span>
            <span style={{ color:'var(--t3)' }}>{item.year}</span>
            {item.duration && <><span style={{ color:'var(--t4)' }}>·</span><span style={{ color:'var(--t3)' }}>⏱ {item.duration}</span></>}
            {isSeries && <><span style={{ color:'var(--t4)' }}>·</span><span style={{ color:'var(--cyan)' }}>{seasons.length} موسم</span></>}
            <span style={{ color:'var(--t4)' }}>·</span><span style={{ color:'var(--t2)' }}>{catLabel}</span>
          </div>
          <div style={{ display:'flex',gap:'.8rem',flexWrap:'wrap' }}>
            {!isSeries && <button className="btn-play" onClick={() => onPlay(item)}>▶ شاهد الفيلم</button>}
            {isSeries && seasons[0]?.episodes?.[0] && <button className="btn-play" onClick={() => onSelectEp(item, seasons[0].episodes[0])}>▶ الحلقة الأولى</button>}
            {user && (
              <button onClick={() => onFavToggle(item)}
                style={{ padding:'.85rem 1.6rem',background:isFav?'rgba(229,9,20,.15)':'rgba(255,255,255,.08)',border:`1px solid ${isFav?'rgba(229,9,20,.4)':'rgba(255,255,255,.15)'}`,borderRadius:10,color:isFav?'var(--red3)':'var(--t1)',cursor:'pointer',fontFamily:"'Cairo',sans-serif",fontSize:'.88rem',fontWeight:600,transition:'all .25s' }}>
                {isFav ? '❤ في المفضلة' : '♡ أضف للمفضلة'}
              </button>
            )}
            <button onClick={onBack} style={{ padding:'.85rem 1.2rem',background:'rgba(255,255,255,.06)',border:'1px solid rgba(255,255,255,.1)',borderRadius:10,color:'var(--t2)',cursor:'pointer',fontFamily:"'Cairo',sans-serif",fontSize:'.82rem',transition:'all .25s' }}>← رجوع</button>
          </div>
        </div>
      </div>

      {/* Body */}
      <div className='det-body-grid' style={{ display:'grid',gridTemplateColumns:'1fr 300px',gap:'2rem',padding:'2rem 3rem',maxWidth:1400,margin:'0 auto' }}>
        <div>
          <p style={{ color:'var(--t2)',fontSize:'.9rem',lineHeight:1.85,marginBottom:'1.5rem',fontFamily:"'Tajawal',sans-serif" }}>
            {item.description || 'لا يوجد وصف'}

          {/* Info tags */}
          <div style={{ display:'flex',gap:'.5rem',flexWrap:'wrap',marginBottom:'1.5rem' }}>
            <span style={{ background:'var(--s2)',border:'1px solid var(--s3)',borderRadius:7,padding:'.28rem .7rem',fontSize:'.72rem',color:'var(--t2)' }}>📅 {item.year}</span>
            <span style={{ background:'var(--s2)',border:'1px solid var(--s3)',borderRadius:7,padding:'.28rem .7rem',fontSize:'.72rem',color:'var(--t2)' }}>⭐ {item.rating}/10</span>
            {item.duration && <span style={{ background:'var(--s2)',border:'1px solid var(--s3)',borderRadius:7,padding:'.28rem .7rem',fontSize:'.72rem',color:'var(--t2)' }}>⏱ {item.duration}</span>}
            <span style={{ background:'var(--s2)',border:'1px solid var(--s3)',borderRadius:7,padding:'.28rem .7rem',fontSize:'.72rem',color:'var(--t2)' }}>{catLabel}</span>
            {item.director && <span style={{ background:'var(--s2)',border:'1px solid var(--s3)',borderRadius:7,padding:'.28rem .7rem',fontSize:'.72rem',color:'var(--t2)' }}>🎬 {item.director}</span>}
          </div>

          {/* Cast */}
          {item.cast_list?.length > 0 && (
            <div style={{ marginBottom:'1.5rem' }}>
              <div style={{ fontSize:'.65rem',color:'var(--t4)',fontWeight:700,textTransform:'uppercase',letterSpacing:'1px',marginBottom:'.7rem' }}>طاقم التمثيل</div>

                  <div key={i} style={{ display:'flex',flexDirection:'column',alignItems:'center',gap:'.3rem',width:64 }}>

                    {seasons.map((s,i) => (
                      <button key={s.id} onClick={() => setSeason(i)}
                        style={{ padding:'.42rem 1rem',background:season===i?'linear-gradient(135deg,var(--gold),#d4a000)':'var(--s2)',border:`1px solid ${season===i?'var(--gold)':'var(--s3)'}`,borderRadius:6,color:season===i?'#000':'var(--t2)',fontWeight:season===i?800:400,cursor:'pointer',fontSize:'.76rem',fontFamily:"'Cairo',sans-serif",transition:'all .22s',fontWeight:season===i?700:400 }}>
                        {s.title} <span style={{ opacity:.65,fontSize:'.63rem' }}>({s.episodes?.length||0})</span>

                    <div key={ep.id} onClick={() => onSelectEp(item, ep)}

        </div>

        {/* Sidebar */}
        <div className='det-sidebar'>
          <div style={{ background:'var(--bg2)',border:'1px solid var(--s2)',borderRadius:14,overflow:'hidden',marginBottom:'1rem' }}>

          <div style={{ background:'var(--bg2)',border:'1px solid var(--s2)',borderRadius:14,padding:'1.2rem' }}>

            {user && <button onClick={() => onFavToggle(item)}

}

/* ═══════════ PLAYER PAGE (Secure) ════════════════════════ */
function PlayerPage({ item, episode, onBack }) {
  const videoRef = useRef(null);
  const [playing, setPlaying] = useState(false);
  const [progress, setProgress] = useState(0);
  const [duration, setDuration] = useState(0);
  const [err, setErr] = useState(false);
  const [showControls, setShowControls] = useState(true);
  const hideTimer = useRef(null);

  const rawUrl = episode?.video_url || item?.video_url;
  const isDirect = rawUrl && /\.(mp4|webm|ogg)(\?|$)/i.test(rawUrl);
  const title = episode ? `${item?.title_en||item?.title} — ${episode.title}` : (item?.title_en||item?.title);

  // Build secure embed URL — never expose raw link
  const getSecureEmbed = (url) => {
    if (!url) return null;
    if (url.includes('/embed/') || url.includes('player.vimeo') || url.includes('dailymotion.com/embed')) return url;
    const yt = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
    if (yt) return `https://www.youtube-nocookie.com/embed/${yt[1]}?autoplay=1&rel=0&modestbranding=1&controls=1`;
    const dm = url.match(/dailymotion\.com\/video\/([a-zA-Z0-9]+)/);
    if (dm) return `https://www.dailymotion.com/embed/video/${dm[1]}?autoplay=1&sharing-enable=false`;
    const vi = url.match(/vimeo\.com\/(\d+)/);
    if (vi) return `https://player.vimeo.com/video/${vi[1]}?autoplay=1&dnt=1`;
    return url;
  };

  const embedUrl = !isDirect ? getSecureEmbed(rawUrl) : null;

  const seek = (sec) => { if (videoRef.current) videoRef.current.currentTime += sec; };
  const togglePlay = () => {
    if (!videoRef.current) return;
    if (videoRef.current.paused) { videoRef.current.play(); setPlaying(true); }
    else { videoRef.current.pause(); setPlaying(false); }
  };
  const resetHideTimer = () => {
    setShowControls(true);
    clearTimeout(hideTimer.current);
    hideTimer.current = setTimeout(() => setShowControls(false), 3500);
  };
  useEffect(() => { resetHideTimer(); return () => clearTimeout(hideTimer.current); }, []);

  return (
    <div className="player-page" onMouseMove={resetHideTimer}>
      {/* Nav */}
      <div style={{ display:'flex',alignItems:'center',gap:'.9rem',padding:'.75rem 1.5rem',background:'rgba(0,0,0,.95)',backdropFilter:'blur(12px)',position:'sticky',top:0,zIndex:10,borderBottom:'1px solid rgba(255,255,255,.04)' }}>
        <button onClick={onBack} style={{ background:'rgba(255,255,255,.07)',border:'1px solid rgba(255,255,255,.1)',color:'var(--t1)',padding:'.4rem .9rem',borderRadius:7,cursor:'pointer',fontSize:'.8rem',fontFamily:"'Cairo',sans-serif",transition:'background .2s' }}>← رجوع</button>
        <span style={{ fontWeight:700,flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',fontFamily:"'Cairo',sans-serif",fontSize:'.88rem' }}>{title}</span>
        {/* NO download link shown - secure */}
        <span style={{ fontSize:'.65rem',color:'var(--t4)',letterSpacing:'.5px' }}>🔒 محمي</span>
      </div>

      {/* Player */}
      <div style={{ position:'relative',width:'100%',background:'#000' }}>
        {!rawUrl && (
          <div style={{ display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',aspectRatio:'16/9',background:'var(--bg1)',color:'var(--t4)',gap:'1rem' }}>
            <div style={{ fontSize:'3rem',opacity:.15 }}>🎬</div>
            <div style={{ fontSize:'.82rem' }}>لا يوجد رابط فيديو</div>
          </div>
        )}

        {rawUrl && isDirect && (
          <div style={{ position:'relative',width:'100%',aspectRatio:'16/9',maxHeight:'80vh',background:'#000',overflow:'hidden' }}>
            <video ref={videoRef} autoPlay style={{ position:'absolute',inset:0,width:'100%',height:'100%' }}
              onTimeUpdate={e => { setProgress(e.target.currentTime); setDuration(e.target.duration||0); }}
              onPlay={()=>setPlaying(true)} onPause={()=>setPlaying(false)}>
              <source src={rawUrl} />
            </video>
          </div>
        )}

        {rawUrl && !isDirect && embedUrl && !err && (
          <div style={{ position:'relative',width:'100%',aspectRatio:'16/9',maxHeight:'80vh',background:'#000',overflow:'hidden' }}>
            {/* Secure iframe - no-cookie YouTube, no direct URL visible */}
            <iframe key={embedUrl} src={embedUrl} title={title} allowFullScreen
              allow="autoplay; fullscreen; encrypted-media"
              referrerPolicy="strict-origin"
              sandbox="allow-scripts allow-same-origin allow-presentation allow-fullscreen"
              style={{ position:'absolute',inset:0,width:'100%',height:'100%',border:'none' }}
              onError={() => setErr(true)} />
            {/* Block right-click on iframe area */}
            <div style={{ position:'absolute',inset:0,zIndex:1,pointerEvents:'none' }} onContextMenu={e=>e.preventDefault()} />
          </div>
        )}

        {rawUrl && !isDirect && err && (
          <div style={{ display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',aspectRatio:'16/9',background:'var(--bg1)',color:'var(--t3)',gap:'1rem' }}>
            <div style={{ fontSize:'2rem',opacity:.3 }}>⚠️</div>
            <div style={{ fontSize:'.82rem' }}>تعذّر تحميل الفيديو</div>
            <button onClick={()=>setErr(false)} style={{ padding:'.5rem 1.2rem',background:'var(--red)',border:'none',borderRadius:7,color:'#fff',cursor:'pointer',fontFamily:"'Cairo',sans-serif",fontSize:'.78rem' }}>إعادة المحاولة</button>
          </div>
        )}

        {/* Controls overlay */}
        {rawUrl && (
          <div style={{ background:'rgba(0,0,0,.85)',padding:'.8rem 1.5rem',transition:'opacity .35s',opacity:showControls?1:0 }}>
            {/* Progress bar (direct video only) */}
            {isDirect && duration > 0 && (
              <div style={{ marginBottom:'.6rem' }}>
                <div style={{ width:'100%',height:4,background:'rgba(255,255,255,.12)',borderRadius:2,cursor:'pointer',position:'relative' }}
                  onClick={e => { const r=e.currentTarget.getBoundingClientRect(); if(videoRef.current) videoRef.current.currentTime=(e.clientX-r.left)/r.width*duration; }}>
                  <div style={{ height:'100%',background:'var(--red)',borderRadius:2,width:`${(progress/duration)*100}%`,transition:'width .2s' }} />
                </div>
                <div style={{ display:'flex',justifyContent:'space-between',marginTop:'.3rem',fontSize:'.63rem',color:'var(--t4)' }}>
                  <span>{Math.floor(progress/60)}:{String(Math.floor(progress%60)).padStart(2,'0')}</span>
                  <span>{Math.floor(duration/60)}:{String(Math.floor(duration%60)).padStart(2,'0')}</span>
                </div>
              </div>
            )}
            <div style={{ display:'flex',alignItems:'center',justifyContent:'center',gap:'.7rem' }}>
              <button onClick={()=>seek(-10)} style={{ background:'rgba(255,255,255,.09)',border:'1px solid rgba(255,255,255,.12)',color:'#fff',padding:'.5rem 1rem',borderRadius:8,cursor:'pointer',fontFamily:"'Cairo',sans-serif",fontSize:'.8rem',transition:'all .22s',display:'flex',alignItems:'center',gap:'.35rem' }}>
                ⏪ <span>10-</span>
              </button>
              {isDirect && (
                <button onClick={togglePlay} style={{ background:'var(--red)',border:'none',color:'#fff',padding:'.55rem 1.6rem',borderRadius:8,cursor:'pointer',fontFamily:"'Cairo',sans-serif",fontSize:'.88rem',fontWeight:700,transition:'all .22s' }}>
                  {playing ? '⏸' : '▶'}
                </button>
              )}
              <button onClick={()=>seek(10)} style={{ background:'rgba(255,255,255,.09)',border:'1px solid rgba(255,255,255,.12)',color:'#fff',padding:'.5rem 1rem',borderRadius:8,cursor:'pointer',fontFamily:"'Cairo',sans-serif",fontSize:'.8rem',transition:'all .22s',display:'flex',alignItems:'center',gap:'.35rem' }}>
                <span>10+</span> ⏩
              </button>
            </div>
          </div>
        )}
      </div>

      {/* Info */}
      {item && (
        <div style={{ padding:'1.5rem 2.5rem',maxWidth:980 }}>
          <div style={{ display:'flex',gap:'.5rem',flexWrap:'wrap',marginBottom:'.7rem' }}>
            {item.genre?.map(g=><span key={g} className="gpill">{g}</span>)}
            <span style={{ color:'var(--t4)',fontSize:'.75rem',alignSelf:'center' }}>{item.year}</span>
            <span style={{ color:'#f5c518',fontSize:'.78rem',alignSelf:'center' }}>★ {item.rating}</span>
          </div>
          <h2 style={{ fontFamily:"'Bebas Neue',sans-serif",fontSize:'1.5rem',letterSpacing:'2px',marginBottom:'.6rem' }}>{title}</h2>
          <p style={{ color:'var(--t2)',fontSize:'.86rem',lineHeight:1.8,fontFamily:"'Tajawal',sans-serif" }}>{episode?.description || item?.description}</p>
        </div>
      )}
    </div>
  );
}

/* ═══════════ ROOT APP ════════════════════════════════════ */
function App() {
  const [page, setPage]     = useState('home');
  const [user, setUser]     = useState(null);
  const [profile, setProfile] = useState(null);
  const [sessionLoad, setSessionLoad] = useState(true);
  const [movies, setMovies] = useState([]);
  const [series, setSeries] = useState([]);
  const [contentLoad, setContentLoad] = useState(true);
  const [favorites, setFavs] = useState([]);
  const [selectedId, setSelectedId] = useState(null);
  const [playerItem, setPlayerItem] = useState(null);
  const [playerEp, setPlayerEp] = useState(null);
  const [searchOpen, setSearchOpen] = useState(false);
  const [scrolled, setScrolled] = useState(false);
  const [menuOpen, setMenuOpen] = useState(false);
  const [toast, setToast] = useState({msg:'',type:''});
  const showToast = useCallback((msg,type='ok')=>{ setToast({msg,type}); setTimeout(()=>setToast({msg:'',type:''}),3200); },[]);
  const nav = useCallback((p)=>{ setPage(p); window.scrollTo(0,0); },[]);

  // SESSION
  useEffect(()=>{
    sb.auth.getSession().then(({data:{session}})=>{
      if (session?.user) { setUser(session.user); DB.getProfile(session.user.id).then(setProfile); }
      setSessionLoad(false);
    });
    const {data:{subscription}} = sb.auth.onAuthStateChange(async(event,session)=>{
      if (event==='SIGNED_IN'&&session?.user) { setUser(session.user); DB.getProfile(session.user.id).then(setProfile); }
      else if (event==='SIGNED_OUT') { setUser(null); setProfile(null); setFavs([]); }
    });
    return ()=>subscription.unsubscribe();
  },[]);

  // CONTENT
  const loadContent = useCallback(()=>{
    setContentLoad(true);
    DB.getAllContent().then(all=>{
      setMovies(all.filter(c=>c.type==='movie'));
      setSeries(all.filter(c=>c.type==='series'));
      setContentLoad(false);
    }).catch(()=>setContentLoad(false));
  },[]);
  useEffect(()=>{ loadContent(); },[loadContent]);

  // FAVORITES
  useEffect(()=>{ if(user) DB.getFavorites(user.id).then(setFavs).catch(()=>{}); },[user]);

  // SCROLL
  useEffect(()=>{
    const fn=()=>setScrolled(window.scrollY>60);
    window.addEventListener('scroll',fn,{passive:true});
    return ()=>window.removeEventListener('scroll',fn);
  },[]);

  const handleAuth = useCallback((u,p)=>{ setUser(u); setProfile(p); nav('home'); showToast('مرحباً! تم تسجيل الدخول ✓'); },[nav,showToast]);
  const handleLogout = useCallback(async()=>{ await DB.logout(); setUser(null); setProfile(null); setFavs([]); setMenuOpen(false); nav('home'); showToast('تم تسجيل الخروج'); },[nav,showToast]);
  const handleItemClick = useCallback((item)=>{ setSelectedId(item.id); nav('detail'); },[nav]);
  const handlePlay = useCallback(async(item)=>{ setPlayerItem(item); setPlayerEp(null); nav('player'); if(user) DB.addHistory(user.id,item.id).catch(()=>{}); },[nav,user]);
  const handleSelectEp = useCallback(async(item,ep)=>{ setPlayerItem(item); setPlayerEp(ep); nav('player'); if(user) DB.addHistory(user.id,item.id,ep.id).catch(()=>{}); },[nav,user]);
  const handleFavToggle = useCallback(async(item)=>{
    if(!user){showToast('يرجى تسجيل الدخول','err');return;}
    const added = await DB.toggleFavorite(user.id,item.id);
    setFavs(prev=>added?[...prev,{content_id:item.id,content:item}]:prev.filter(f=>f.content_id!==item.id));
    showToast(added?'❤ أضيف للمفضلة':'تمت الإزالة من المفضلة');
  },[user,showToast]);
  const handleBack = useCallback(()=>{ if(page==='player'){nav(selectedId?'detail':'home');return;} nav('home'); },[page,selectedId,nav]);

  if (sessionLoad) return (
    <div><style>{CSS}</style>
    <div className="loading-sc"><div className="loading-logo"><span style={{color:'#fff'}}>FLIX</span><span style={{color:'var(--red)'}}>TN</span></div><Spin /></div></div>
  );

  const isAdmin = profile?.is_admin;
  const showNav = !['auth','player'].includes(page);
  const showFoot = !['auth','player','admin'].includes(page);
  const favIds = new Set(favorites.map(f=>f.content_id));

  return (
    <div>
      <style>{CSS}</style>
      {toast.msg && <Toast msg={toast.msg} type={toast.type} onClose={()=>setToast({msg:'',type:''})} />}
      {searchOpen && <SearchOverlay movies={movies} series={series} onItemClick={it=>{handleItemClick(it);setSearchOpen(false);}} onClose={()=>setSearchOpen(false)} />}

      {showNav && (
        <nav className={`nav ${scrolled?'s':'t'}`}>
          <div style={{display:'flex',alignItems:'center',gap:'2rem'}}>
            <div className="logo" onClick={()=>nav('home')}><span style={{color:'#fff'}}>FLIX</span><span style={{color:'var(--red)'}}>TN</span></div>
            <div className="nav-links">
              {[['home','الرئيسية'],['browse','تصفح'],['movies','الأفلام'],['series','المسلسلات']].map(([k,l])=>(
                <div key={k} className={`nl ${page===k?'a':''}`} onClick={()=>nav(k)}>{l}</div>
              ))}
              {isAdmin && <div className={`nl ${page==='admin'?'a':''}`} onClick={()=>nav('admin')}>⚙ الإدارة</div>}
            </div>
          </div>
          <button className="mob-menu-btn" style={{ display:'none',background:'none',border:'1px solid var(--s3)',color:'var(--t2)',padding:'.4rem .7rem',borderRadius:7,cursor:'pointer',fontSize:'.85rem' }}
              onClick={()=>document.getElementById('mob-nav')?.classList.toggle('open')}>☰</button>
            <div className="nav-r">
            <button className="ni" onClick={()=>setSearchOpen(true)}>🔍</button>
            {user ? (
              <div className="av-wrap">
                <img className="av" src={profile?.avatar_url||`https://api.dicebear.com/7.x/avataaars/svg?seed=${user.email}`} alt="" onClick={()=>setMenuOpen(!menuOpen)} onError={e=>e.target.src=`https://api.dicebear.com/7.x/initials/svg?seed=U`} />
                {menuOpen && (
                  <div className="umenu">
                    <div className="umenu-head">
                      <img src={profile?.avatar_url||`https://api.dicebear.com/7.x/avataaars/svg?seed=${user.email}`} alt="" onError={e=>e.target.src=`https://api.dicebear.com/7.x/initials/svg?seed=U`} />
                      <div><div className="nm">{profile?.username||'مستخدم'}</div><div className="em">{user.email}</div></div>
                    </div>
                    <button className="mi" onClick={()=>{nav('home');setMenuOpen(false);}}>🏠 الرئيسية</button>
                    <button className="mi" onClick={()=>{nav('profile');setMenuOpen(false);}}>👤 ملفي الشخصي</button>
                    {isAdmin && <button className="mi" onClick={()=>{nav('admin');setMenuOpen(false);}}>⚙ لوحة الإدارة</button>}
                    <div className="md" />
                    <button className="mi" style={{color:'var(--red3)'}} onClick={handleLogout}>🚪 تسجيل الخروج</button>
                  </div>
                )}
              </div>
            ) : (
              <div style={{display:'flex',gap:'.5rem'}}>
                <button className="btn-in" onClick={()=>nav('auth')}>دخول</button>
                <button className="btn-up" onClick={()=>nav('auth')}>انضم مجاناً</button>
              </div>
            )}
          </div>
        </nav>
      )}
      {menuOpen && <div style={{position:'fixed',inset:0,zIndex:150}} onClick={()=>setMenuOpen(false)} />}

      {page==='auth'    && <AuthPage onAuth={handleAuth} />}
      {page==='home'    && <HomePage movies={movies} series={series} loading={contentLoad} onItemClick={handleItemClick} onPlay={handlePlay} user={user} favorites={favorites} onFavToggle={handleFavToggle} />}
      {page==='movies'  && <ContentListPage type="movie"  items={movies} loading={contentLoad} onItemClick={handleItemClick} user={user} favorites={favorites} onFavToggle={handleFavToggle} />}
      {page==='series'  && <ContentListPage type="series" items={series} loading={contentLoad} onItemClick={handleItemClick} user={user} favorites={favorites} onFavToggle={handleFavToggle} />}
      {page==='browse'  && <BrowsePage movies={movies} series={series} loading={contentLoad} onItemClick={handleItemClick} user={user} favorites={favorites} onFavToggle={handleFavToggle} />}
      {page==='detail'  && selectedId && <DetailPage itemId={selectedId} onPlay={handlePlay} onBack={handleBack} user={user} profile={profile} favorites={favorites} onFavToggle={handleFavToggle} onSelectEp={handleSelectEp} />}
      {page==='player'  && playerItem  && <PlayerPage item={playerItem} episode={playerEp} onBack={handleBack} />}
      {page==='profile' && user        && <ProfilePage user={user} profile={profile} onLogout={handleLogout} onProfileUpdate={setProfile} movies={movies} series={series} />}
      {page==='admin'   && isAdmin     && <AdminPage movies={movies} series={series} goHome={()=>nav('home')} onRefresh={loadContent} />}

      {showFoot && (
        <footer className="footer">
          <div className="ft-grid">
            <div><div className="ft-logo"><span>FLIX</span><span style={{color:'var(--red)'}}>TN</span></div><div style={{fontSize:'.75rem',color:'var(--t3)',lineHeight:1.7,maxWidth:280}}>بوابتك إلى السينما العربية والتونسية والعالمية.</div></div>
            <div><div style={{fontSize:'.65rem',textTransform:'uppercase',letterSpacing:'1px',color:'var(--t4)',fontWeight:700,marginBottom:'.8rem'}}>تصفح</div>{[['الرئيسية','home'],['الأفلام','movies'],['المسلسلات','series']].map(([l,k])=><span key={k} className="ft-link" onClick={()=>nav(k)}>{l}</span>)}</div>
            <div><div style={{fontSize:'.65rem',textTransform:'uppercase',letterSpacing:'1px',color:'var(--t4)',fontWeight:700,marginBottom:'.8rem'}}>الأنواع</div>{['دراما','أكشن','خيال علمي','كوميديا'].map(g=><span key={g} className="ft-link">{g}</span>)}</div>
            <div><div style={{fontSize:'.65rem',textTransform:'uppercase',letterSpacing:'1px',color:'var(--t4)',fontWeight:700,marginBottom:'.8rem'}}>الحساب</div>{user?[['👤 ملفي','profile'],['🚪 خروج','logout']].map(([l,k])=><span key={k} className="ft-link" onClick={()=>k==='logout'?handleLogout():nav(k)}>{l}</span>):[['دخول','auth'],['تسجيل','auth']].map(([l,k])=><span key={l} className="ft-link" onClick={()=>nav(k)}>{l}</span>)}</div>
          </div>
          <div className="ft-bot">
            <div style={{fontSize:'.7rem',color:'var(--t4)'}}>© {new Date().getFullYear()} FlixTN. جميع الحقوق محفوظة.</div>
          </div>
        </footer>
      )}
    </div>
  );
}

    document.getElementById('boot')?.remove();
    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>
</body>
</html>
