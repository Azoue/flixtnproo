const CSS = `
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Bebas+Neue&family=Tajawal:wght@300;400;500;700;800&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#06060a;--bg1:#0b0b10;--bg2:#101018;--bg3:#15151e;
  --s1:#1a1a24;--s2:#20202e;--s3:#28283c;--s4:#323248;
  --red:#e50914;--red2:#ff1f2e;--red3:#ff6b75;
  --redbg:rgba(229,9,20,.08);--redbr:rgba(229,9,20,.22);
  --gold:#f5c518;--gold2:#ffd700;--gold3:#ffec6e;
  --goldbg:rgba(245,197,24,.1);--goldbr:rgba(245,197,24,.3);
  --accent:#f5c518;--accent2:#ffd700;
  --cyan:#00cfff;--green:#21c55d;
  --t1:#fff8e8;--t2:#c8b890;--t3:#786848;--t4:#3e3828;
  --r:12px;--r2:16px;--tr:.25s cubic-bezier(.4,0,.2,1);
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--t1);font-family:'Cairo',sans-serif;overflow-x:hidden;direction:rtl}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}

/* NAV */
.nav{position:fixed;top:0;left:0;right:0;z-index:200;display:flex;align-items:center;justify-content:space-between;padding:.9rem 3rem;transition:all .45s}
.nav.t{background:linear-gradient(180deg,rgba(7,7,12,.95) 0%,transparent 100%)}
.nav.s{background:rgba(7,7,12,.97);backdrop-filter:blur(32px);box-shadow:0 1px 0 rgba(255,255,255,.04)}
.logo{font-family:'Bebas Neue',sans-serif;font-size:2rem;cursor:pointer;letter-spacing:4px;background:linear-gradient(120deg,#fff 0%,var(--gold2) 40%,var(--red) 80%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 0 14px rgba(245,197,24,.5));transition:filter .3s}
.logo:hover{filter:drop-shadow(0 0 28px rgba(245,197,24,.9))}
.nav-links{display:flex;gap:2.2rem}
.nl{font-size:.78rem;cursor:pointer;color:var(--t3);transition:all .25s;padding:.4rem 0;position:relative;letter-spacing:.8px;font-weight:600}
.nl::after{content:'';position:absolute;bottom:-1px;right:0;width:100%;height:2px;background:linear-gradient(90deg,var(--gold),var(--red));border-radius:2px;transform:scaleX(0);transform-origin:right;transition:transform .3s}
.nl:hover,.nl.a{color:var(--t1)}
.nl:hover::after,.nl.a::after{transform:scaleX(1)}
.nav-r{display:flex;align-items:center;gap:.6rem}
.ni{background:none;border:none;color:var(--t2);font-size:1rem;cursor:pointer;width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:all var(--tr)}
.ni:hover{background:var(--s2);color:var(--t1);transform:scale(1.1)}
.av-wrap{position:relative}
.av{width:36px;height:36px;border-radius:50%;object-fit:cover;cursor:pointer;border:2px solid var(--s3);transition:all .3s}
.av:hover{border-color:var(--red);transform:scale(1.08);box-shadow:0 0 0 3px rgba(229,9,20,.2)}
.umenu{position:absolute;left:0;top:calc(100% + .9rem);background:rgba(13,13,20,.98);border:1px solid var(--s3);border-radius:18px;min-width:250px;overflow:hidden;box-shadow:0 28px 90px rgba(0,0,0,.95);animation:mIn .22s cubic-bezier(.4,0,.2,1);z-index:500;backdrop-filter:blur(24px)}
@keyframes mIn{from{opacity:0;transform:translateY(-12px) scale(.96)}to{opacity:1;transform:translateY(0) scale(1)}}
.umenu-head{padding:1.2rem 1rem;display:flex;align-items:center;gap:.85rem;border-bottom:1px solid var(--s2);background:linear-gradient(135deg,var(--s1) 0%,rgba(229,9,20,.06) 100%)}
.umenu-head img{width:44px;height:44px;border-radius:50%;border:2px solid var(--red);box-shadow:0 0 14px rgba(229,9,20,.35)}
.umenu-head .nm{font-weight:700;font-size:.86rem}
.umenu-head .em{font-size:.64rem;color:var(--t3);margin-top:.18rem}
.mi{display:flex;align-items:center;gap:.75rem;padding:.75rem 1rem;font-size:.8rem;cursor:pointer;transition:all var(--tr);width:100%;background:none;border:none;color:var(--t2);text-align:right}
.mi:hover{background:var(--s2);color:var(--t1);padding-right:1.4rem}
.md{height:1px;background:var(--s2);margin:.25rem 0}
.btn-in{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:var(--t1);padding:.48rem 1.2rem;border-radius:9px;cursor:pointer;font-size:.78rem;font-family:'Cairo',sans-serif;transition:all var(--tr)}
.btn-in:hover{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.2)}
.btn-up{background:linear-gradient(135deg,var(--gold) 0%,#d4a000 100%);border:none;color:#000;padding:.48rem 1.2rem;border-radius:9px;cursor:pointer;font-size:.78rem;font-family:'Cairo',sans-serif;font-weight:800;transition:all var(--tr);box-shadow:0 2px 14px rgba(245,197,24,.35);letter-spacing:.3px}
.btn-up:hover{transform:translateY(-2px) scale(1.04);box-shadow:0 6px 28px rgba(245,197,24,.6)}

/* HERO */
.hero{position:relative;height:100vh;min-height:600px;display:flex;align-items:flex-end;overflow:hidden}
.hero-bg{position:absolute;inset:0;overflow:hidden}
.hero-bg img{
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%) scale(1.0);
  width:100%;height:100%;
  object-fit:cover;
  object-position:center top;
  image-rendering:auto;
  animation:kb 30s ease-in-out infinite alternate;
  filter:brightness(1.05) contrast(1.08) saturate(1.1);
  transition:opacity .8s ease;
  will-change:transform;
}
@keyframes kb{
  0%{transform:translate(-50%,-50%) scale(1.0) translateX(0px)}
  33%{transform:translate(-50%,-50%) scale(1.03) translateX(-8px)}
  66%{transform:translate(-50%,-50%) scale(1.05) translateX(5px)}
  100%{transform:translate(-50%,-50%) scale(1.07) translateX(-3px)}
}
.hero-ov{position:absolute;inset:0;background:linear-gradient(to top,var(--bg) 0%,rgba(8,8,15,.55) 30%,rgba(8,8,15,.1) 55%,transparent 100%)}
.hero-ov2{position:absolute;inset:0;background:linear-gradient(to left,transparent 38%,rgba(8,8,15,.75) 75%,rgba(8,8,15,.92) 100%)}
.hero-ov3{position:absolute;inset:0;background:radial-gradient(ellipse at 20% 60%,rgba(245,197,24,.05) 0%,transparent 50%)}
.hero-fade{position:absolute;inset:0;background:linear-gradient(to top,var(--bg) 0%,transparent 18%)}
.hero-c{position:relative;z-index:2;padding:3.5rem 3.5rem 5.5rem;max-width:650px;animation:heroIn 1s cubic-bezier(.4,0,.2,1) both;margin-right:auto}
@keyframes heroIn{from{opacity:0;transform:translateY(32px)}to{opacity:1;transform:translateY(0)}}
.hero-live{display:inline-flex;align-items:center;gap:.45rem;background:linear-gradient(135deg,rgba(245,197,24,.18),rgba(245,197,24,.06));border:1px solid rgba(245,197,24,.4);color:var(--gold3);padding:.32rem 1rem;border-radius:30px;font-size:.68rem;font-weight:700;letter-spacing:.8px;margin-bottom:1.2rem;backdrop-filter:blur(10px);box-shadow:0 2px 14px rgba(245,197,24,.2)}
.hero-live-dot{width:7px;height:7px;border-radius:50%;background:var(--gold);display:inline-block;animation:livepulse 1.8s ease infinite;box-shadow:0 0 0 0 rgba(245,197,24,.8)}
@keyframes livepulse{0%{box-shadow:0 0 0 0 rgba(245,197,24,.8)}70%{box-shadow:0 0 0 8px rgba(245,197,24,0)}100%{box-shadow:0 0 0 0 rgba(245,197,24,0)}}
.hero-live-dot{width:7px;height:7px;border-radius:50%;background:var(--red);animation:blink 1.5s ease infinite}
@keyframes blink{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.6)}}
.hero-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(3rem,7vw,5.5rem);line-height:.95;margin-bottom:.6rem;letter-spacing:2px;text-shadow:0 4px 30px rgba(0,0,0,.6)}
.hero-sub{font-family:'Tajawal',sans-serif;font-size:1rem;color:var(--t2);margin-bottom:.7rem;font-weight:300;letter-spacing:.3px}
.hero-meta{display:flex;gap:.8rem;align-items:center;flex-wrap:wrap;margin-bottom:1.2rem;font-size:.82rem}
.hero-rating{color:var(--gold);font-weight:700;font-size:.9rem;display:flex;align-items:center;gap:.25rem}
.hero-sep{width:3px;height:3px;border-radius:50%;background:var(--t4)}
.hero-desc{color:var(--t2);font-size:.88rem;line-height:1.82;max-width:500px;margin-bottom:2rem;font-family:'Tajawal',sans-serif;font-weight:400}
.hero-btns{display:flex;gap:.9rem;flex-wrap:wrap}
.btn-play{background:linear-gradient(135deg,var(--red) 0%,#c0000a 100%);border:none;color:#fff;padding:.85rem 2.2rem;border-radius:10px;cursor:pointer;font-size:.9rem;font-family:'Cairo',sans-serif;font-weight:700;display:flex;align-items:center;gap:.6rem;transition:all .3s;box-shadow:0 4px 22px rgba(229,9,20,.45),inset 0 1px 0 rgba(255,255,255,.12)}
.btn-play:hover{transform:translateY(-3px) scale(1.02);box-shadow:0 10px 38px rgba(229,9,20,.65),inset 0 1px 0 rgba(255,255,255,.15)}
.btn-play:active{transform:translateY(-1px)}
.btn-play-ico{width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;font-size:.7rem}
.btn-ol{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.13);color:var(--t1);padding:.85rem 2rem;border-radius:10px;cursor:pointer;font-size:.9rem;font-family:'Cairo',sans-serif;font-weight:600;transition:all .3s;backdrop-filter:blur(8px)}
.btn-ol:hover{background:rgba(255,255,255,.15);border-color:rgba(255,255,255,.28);transform:translateY(-2px)}
.gpill{background:rgba(229,9,20,.12);border:1px solid rgba(229,9,20,.3);color:var(--red3);padding:.22rem .6rem;border-radius:20px;font-size:.65rem;font-weight:700}

/* ROWS */
.section{padding:.5rem 0 2.2rem}
.sec-hd{display:flex;align-items:center;justify-content:space-between;padding:.5rem 3rem 1rem}
.sec-hd-l{display:flex;align-items:center;gap:.75rem}
.sec-line{width:3px;height:20px;background:linear-gradient(to bottom,var(--red),rgba(229,9,20,0));border-radius:2px}
.sec-title{font-family:'Bebas Neue',sans-serif;font-size:1.25rem;letter-spacing:2px;color:var(--t1)}
.sec-more{font-size:.72rem;color:var(--t3);cursor:pointer;transition:color .22s;letter-spacing:.5px}
.sec-more:hover{color:var(--red3)}
.slider{display:flex;gap:1.1rem;overflow-x:auto;padding:.4rem 3rem 1.2rem;scroll-snap-type:x mandatory;scrollbar-width:none}
.slider::-webkit-scrollbar{display:none}

/* CARDS */
.card{flex-shrink:0;width:162px;cursor:pointer;position:relative;scroll-snap-align:start;transition:all .32s cubic-bezier(.4,0,.2,1)}
.card:hover{transform:translateY(-10px) scale(1.06);z-index:5}
.card-wrap{position:relative;border-radius:var(--r);overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,.5)}
.card:hover .card-wrap{box-shadow:0 20px 55px rgba(229,9,20,.4),0 0 0 1px rgba(229,9,20,.2)}
.card-img{width:162px;height:243px;object-fit:cover;display:block;background:var(--s2);transition:transform .35s}
.card:hover .card-img{transform:scale(1.04)}
.card-ov{position:absolute;inset:0;background:linear-gradient(to top,rgba(7,7,12,1) 0%,rgba(7,7,12,.3) 55%,transparent 100%);opacity:0;transition:opacity .28s}
.card:hover .card-ov{opacity:1}
.card-play{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(.6);width:50px;height:50px;border-radius:50%;background:rgba(229,9,20,.92);display:flex;align-items:center;justify-content:center;opacity:0;transition:all .28s;font-size:1.1rem;box-shadow:0 0 28px rgba(229,9,20,.6)}
.card:hover .card-play{opacity:1;transform:translate(-50%,-50%) scale(1);box-shadow:0 0 0 8px rgba(245,197,24,.2),0 4px 20px rgba(245,197,24,.4);color:#000}
.card-info{position:absolute;bottom:0;left:0;right:0;padding:.75rem;opacity:0;transition:all .28s;transform:translateY(4px)}
.card:hover .card-info{opacity:1;transform:translateY(0)}
.card-title{font-size:.75rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:.22rem}
.card-meta{font-size:.63rem;color:var(--t3);display:flex;gap:.45rem;align-items:center}
.card-badge{position:absolute;top:.55rem;right:.55rem;background:linear-gradient(135deg,var(--red),#c0000a);color:#fff;font-size:.56rem;font-weight:700;padding:.16rem .42rem;border-radius:5px;letter-spacing:.3px}
.card-fav{position:absolute;top:.55rem;left:.55rem;width:28px;height:28px;border-radius:50%;background:rgba(0,0,0,.75);border:1px solid rgba(255,255,255,.08);color:var(--t3);cursor:pointer;font-size:.85rem;display:flex;align-items:center;justify-content:center;opacity:0;transition:all .25s;border:none}
.card:hover .card-fav{opacity:1}
.card-fav:hover,.card-fav.on{color:var(--red)}
.card-fav.on{opacity:1}

/* RANK */
.rank-card{flex-shrink:0;width:185px;cursor:pointer;display:flex;align-items:flex-end;scroll-snap-align:start;transition:transform .3s}
.rank-card:hover{transform:translateY(-6px)}
.rank-num{font-family:'Bebas Neue',sans-serif;font-size:8.5rem;line-height:1;color:transparent;-webkit-text-stroke:2px var(--s3);margin-left:-24px;flex-shrink:0;transition:all .28s;letter-spacing:-3px}
.rank-card:hover .rank-num{-webkit-text-stroke-color:var(--red);filter:drop-shadow(0 0 12px rgba(229,9,20,.35))}
.rank-img{width:132px;height:198px;object-fit:cover;border-radius:var(--r);background:var(--s2);transition:all .28s;box-shadow:0 8px 30px rgba(0,0,0,.5)}
.rank-card:hover .rank-img{box-shadow:0 18px 55px rgba(229,9,20,.45)}

/* WIDE */
.wide-card{flex-shrink:0;width:285px;cursor:pointer;scroll-snap-align:start;transition:all .3s;border-radius:var(--r);overflow:hidden;position:relative}
.wide-card:hover{transform:translateY(-6px)}
.wide-img{width:285px;height:160px;object-fit:cover;display:block;background:var(--s2);transition:transform .35s}
.wide-card:hover .wide-img{transform:scale(1.04);box-shadow:0 14px 45px rgba(229,9,20,.35)}
.wide-ov{position:absolute;inset:0;background:linear-gradient(to top,rgba(7,7,12,.95) 0%,transparent 55%);display:flex;flex-direction:column;justify-content:flex-end;padding:.75rem;opacity:0;transition:opacity .28s}
.wide-card:hover .wide-ov{opacity:1}
.wide-play{width:36px;height:36px;border-radius:50%;background:var(--red);display:flex;align-items:center;justify-content:center;font-size:.75rem;margin-bottom:.4rem;box-shadow:0 0 16px rgba(229,9,20,.5)}
.wide-title{font-size:.8rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding:.55rem .2rem .15rem}
.wide-meta{font-size:.66rem;color:var(--t3);padding:0 .2rem;display:flex;gap:.5rem}

/* FEATURED BIG CARD */
.feat-card{flex-shrink:0;width:360px;cursor:pointer;scroll-snap-align:start;position:relative;border-radius:14px;overflow:hidden;transition:all .3s}
.feat-card:hover{transform:translateY(-7px);box-shadow:0 20px 60px rgba(229,9,20,.3)}
.feat-img{width:360px;height:210px;object-fit:cover;display:block;background:var(--s2);transition:transform .4s}
.feat-card:hover .feat-img{transform:scale(1.05)}
.feat-ov{position:absolute;inset:0;background:linear-gradient(to top,rgba(7,7,12,.97) 0%,rgba(7,7,12,.2) 55%,transparent 100%)}
.feat-body{position:absolute;bottom:0;left:0;right:0;padding:1rem 1.1rem}
.feat-title{font-family:'Bebas Neue',sans-serif;font-size:1.35rem;letter-spacing:1px;margin-bottom:.3rem}
.feat-meta{font-size:.68rem;color:var(--t3);display:flex;gap:.5rem;align-items:center}
.feat-play{position:absolute;top:.75rem;left:.75rem;width:40px;height:40px;border-radius:50%;background:rgba(229,9,20,.88);display:flex;align-items:center;justify-content:center;opacity:0;transition:all .28s;font-size:.85rem;box-shadow:0 0 20px rgba(229,9,20,.55)}
.feat-card:hover .feat-play{opacity:1;transform:scale(1.1)}

/* SKEL */
.skel{background:linear-gradient(90deg,var(--s2) 25%,var(--s3) 50%,var(--s2) 75%);background-size:200% 100%;animation:sh 1.6s ease infinite;border-radius:var(--r)}
@keyframes sh{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* GENRE CHIPS */
.genre-strip{display:flex;gap:.55rem;padding:.3rem 3rem .8rem;overflow-x:auto;scrollbar-width:none}
.genre-strip::-webkit-scrollbar{display:none}
.g-chip{flex-shrink:0;padding:.42rem 1.1rem;background:var(--s1);border:1px solid var(--s2);border-radius:30px;font-size:.75rem;cursor:pointer;color:var(--t3);transition:all .25s;font-family:'Cairo',sans-serif}
.g-chip:hover,.g-chip.a{background:var(--red);border-color:var(--red);color:#fff;box-shadow:0 4px 14px rgba(229,9,20,.35)}

/* DETAIL */
.det-hero{position:relative;height:65vh;min-height:430px;display:flex;align-items:flex-end;overflow:hidden}
.det-bg{position:absolute;inset:0}
.det-bg img{width:100%;height:100%;object-fit:cover}
.det-ov{position:absolute;inset:0;background:linear-gradient(to top,var(--bg) 0%,rgba(7,7,12,.6) 45%,transparent 100%)}
.det-c{position:relative;z-index:2;padding:2.5rem 3rem}
.det-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(2rem,5vw,3.8rem);line-height:1;margin-bottom:.55rem;letter-spacing:2px}
.det-body{display:grid;grid-template-columns:1fr 290px;gap:2rem;padding:2rem 3rem;max-width:1400px;margin:0 auto}

.det-desc{color:var(--t2);font-size:.9rem;line-height:1.8;margin-bottom:1.5rem;font-family:'Tajawal',sans-serif}
.itag{background:var(--s2);border:1px solid var(--s3);border-radius:7px;padding:.28rem .65rem;font-size:.71rem;color:var(--t2)}
.cast-row{display:flex;gap:.8rem;flex-wrap:wrap;margin-top:.7rem}
.cast-item{display:flex;flex-direction:column;align-items:center;gap:.3rem;width:62px}
.cast-img{width:52px;height:52px;border-radius:50%;object-fit:cover;background:var(--s2);border:2px solid var(--s3)}
.cast-nm{font-size:.6rem;text-align:center;color:var(--t2);line-height:1.2}
.sb-card{background:var(--bg2);border:1px solid var(--s2);border-radius:var(--r2);padding:1.2rem;margin-bottom:.9rem}

.act-btn{display:block;width:100%;padding:.72rem;background:var(--s2);border:1px solid var(--s3);border-radius:9px;color:var(--t1);cursor:pointer;font-family:'Cairo',sans-serif;font-size:.8rem;text-align:center;margin-bottom:.5rem;transition:all .25s}
.act-btn:hover{background:var(--s3);border-color:var(--red)}
.act-btn.fav{background:var(--redbg);border-color:var(--redbr);color:var(--red3)}

/* EPISODES */
.season-tabs{display:flex;gap:.45rem;flex-wrap:wrap;margin-bottom:1.1rem}
.s-tab{padding:.42rem 1rem;background:var(--s2);border:1px solid var(--s3);border-radius:7px;color:var(--t2);cursor:pointer;font-size:.76rem;font-family:'Cairo',sans-serif;transition:all .25s}
.s-tab:hover,.s-tab.a{background:var(--red);border-color:var(--red);color:#fff;font-weight:700}
.ep-item{display:flex;align-items:center;gap:1rem;padding:.9rem;background:var(--bg2);border:1px solid var(--s2);border-radius:var(--r);cursor:pointer;margin-bottom:.55rem;transition:all .25s}
.ep-item:hover{background:var(--s1);border-color:var(--s3);transform:translateX(-4px)}
.ep-num{font-family:'Bebas Neue',sans-serif;font-size:1.5rem;color:var(--t4);width:30px;flex-shrink:0;text-align:center}
.ep-thumb{width:120px;height:68px;object-fit:cover;border-radius:7px;background:var(--s2);flex-shrink:0}
.ep-info{flex:1;min-width:0}
.ep-title{font-weight:700;font-size:.84rem;margin-bottom:.18rem}
.ep-desc{font-size:.72rem;color:var(--t3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ep-dur{font-size:.67rem;color:var(--t4);margin-top:.18rem}
.ep-actions{display:flex;gap:.4rem;flex-shrink:0}
.ep-dl-btn{padding:.3rem .65rem;background:rgba(0,207,255,.08);border:1px solid rgba(0,207,255,.22);border-radius:6px;color:var(--cyan);font-size:.68rem;cursor:pointer;transition:all .22s;font-family:'Cairo',sans-serif;white-space:nowrap}
.ep-dl-btn:hover{background:rgba(0,207,255,.18)}

/* PLAYER */
.player-page{background:#000;min-height:100vh}
.player-nav{display:flex;align-items:center;gap:1rem;padding:.75rem 1.5rem;background:rgba(0,0,0,.92);backdrop-filter:blur(12px);position:sticky;top:0;z-index:10}
.player-back{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);color:var(--t1);padding:.4rem .9rem;border-radius:7px;cursor:pointer;font-size:.8rem;font-family:'Cairo',sans-serif;transition:all .22s}
.player-back:hover{background:rgba(255,255,255,.16)}
.player-outer{position:relative;width:100%;background:#000}
.player-inner{position:relative;width:100%;aspect-ratio:16/9;max-height:80vh;overflow:hidden;background:#000}
.player-inner iframe,.player-inner video{position:absolute;inset:0;width:100%;height:100%;border:none}
.player-controls{display:flex;align-items:center;justify-content:center;gap:.8rem;padding:.9rem 1.5rem;background:rgba(0,0,0,.85)}
.pc-btn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);color:#fff;padding:.55rem 1.1rem;border-radius:8px;cursor:pointer;font-size:.82rem;font-family:'Cairo',sans-serif;transition:all .22s;display:flex;align-items:center;gap:.4rem;white-space:nowrap}
.pc-btn:hover{background:rgba(255,255,255,.22);transform:scale(1.05)}
.pc-btn.main{background:var(--red);border-color:var(--red);padding:.55rem 1.4rem;font-size:.88rem;font-weight:700}
.pc-btn.main:hover{background:var(--red2)}
.pc-btn.dl{background:rgba(0,207,255,.1);border-color:rgba(0,207,255,.3);color:var(--cyan)}
.pc-btn.dl:hover{background:rgba(0,207,255,.22)}
.player-progress-wrap{padding:.3rem 1.5rem .2rem;background:rgba(0,0,0,.85)}
.player-progress{width:100%;height:4px;background:rgba(255,255,255,.15);border-radius:2px;cursor:pointer;position:relative}
.player-progress-fill{height:100%;background:var(--red);border-radius:2px;transition:width .2s}
.player-no-video{display:flex;flex-direction:column;align-items:center;justify-content:center;aspect-ratio:16/9;background:var(--bg1);color:var(--t3);gap:1rem}
.player-info{padding:1.5rem 3rem;max-width:980px}

/* SEARCH */
.search-ov{position:fixed;inset:0;z-index:1000;background:rgba(5,5,12,.97);backdrop-filter:blur(28px);overflow-y:auto;padding:5rem 1.5rem 2rem}
.search-box{max-width:900px;margin:0 auto}
.search-field{display:flex;align-items:center;gap:.8rem;background:var(--bg2);border:1px solid var(--s3);border-radius:14px;padding:.75rem 1.1rem;margin-bottom:1.6rem}
.search-in{background:none;border:none;color:var(--t1);font-size:1.1rem;font-family:'Cairo',sans-serif;flex:1;outline:none}
.s-lbl{font-size:.7rem;color:var(--t3);font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:.8rem}
.s-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:1rem}

/* AUTH */
.auth-page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;position:relative}
.auth-bg{position:fixed;inset:0;background:radial-gradient(ellipse at 30% 50%,rgba(229,9,20,.07) 0%,transparent 60%),linear-gradient(135deg,var(--bg) 0%,var(--bg2) 100%);z-index:-1}
.auth-box{background:rgba(13,13,20,.96);border:1px solid var(--s3);border-radius:20px;padding:2.8rem;width:100%;max-width:430px;backdrop-filter:blur(24px);box-shadow:0 30px 80px rgba(0,0,0,.9)}
.auth-logo{font-family:'Bebas Neue',sans-serif;font-size:2.2rem;text-align:center;margin-bottom:.25rem;letter-spacing:4px;background:linear-gradient(120deg,#fff,var(--red));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.auth-sub{text-align:center;font-size:.73rem;color:var(--t3);margin-bottom:1.8rem}
.auth-tabs{display:flex;background:var(--s1);border-radius:10px;padding:.28rem;margin-bottom:1.5rem}
.at{flex:1;padding:.55rem;border:none;background:transparent;color:var(--t2);cursor:pointer;font-family:'Cairo',sans-serif;font-size:.82rem;border-radius:8px;transition:all .22s}
.at.a{background:var(--red);color:#fff;font-weight:700;box-shadow:0 2px 10px rgba(229,9,20,.4)}
.fg{margin-bottom:1.1rem}
.fl{display:block;font-size:.68rem;color:var(--t3);margin-bottom:.38rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.fi{width:100%;background:var(--bg3);border:1px solid var(--s3);border-radius:10px;padding:.75rem 1rem;color:var(--t1);font-family:'Cairo',sans-serif;font-size:.9rem;outline:none;transition:border-color .25s;direction:ltr}
.fi:focus{border-color:var(--red);box-shadow:0 0 0 3px rgba(229,9,20,.12)}
.fi-r{direction:rtl}
.ferr{background:var(--redbg);border:1px solid var(--redbr);border-radius:9px;padding:.65rem .9rem;font-size:.78rem;color:var(--red3);margin-bottom:.9rem}
.fok{background:rgba(33,197,93,.1);border:1px solid rgba(33,197,93,.28);border-radius:9px;padding:.65rem .9rem;font-size:.78rem;color:var(--green);margin-bottom:.9rem}
.btn-auth{width:100%;background:linear-gradient(135deg,var(--red),#b5000a);border:none;color:#fff;padding:.9rem;border-radius:10px;cursor:pointer;font-size:.92rem;font-family:'Cairo',sans-serif;font-weight:700;transition:all .25s;margin-top:.4rem;box-shadow:0 4px 18px rgba(229,9,20,.4)}
.btn-auth:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(229,9,20,.6)}
.btn-auth:disabled{background:var(--s2);color:var(--t3);cursor:not-allowed;transform:none;box-shadow:none}

/* PROFILE */
.prof-page{padding:5.5rem 3rem 3rem;max-width:1300px;margin:0 auto}
.prof-cover{height:210px;border-radius:var(--r2);background:linear-gradient(135deg,var(--s3) 0%,var(--s1) 100%);position:relative;overflow:hidden;margin-bottom:4rem}
.prof-av-wrap{position:absolute;bottom:-3rem;right:2.5rem}
.prof-av{width:95px;height:95px;border-radius:50%;object-fit:cover;border:4px solid var(--bg);background:var(--s2);box-shadow:0 4px 20px rgba(0,0,0,.5)}
.p-tab-row{display:flex;gap:.4rem;border-bottom:1px solid var(--s2);margin-bottom:1.5rem;overflow-x:auto;scrollbar-width:none;padding-bottom:.5rem}
.p-tab{padding:.6rem 1.2rem;background:transparent;border:none;color:var(--t3);cursor:pointer;font-size:.8rem;font-family:'Cairo',sans-serif;white-space:nowrap;border-bottom:2px solid transparent;padding-bottom:.8rem;transition:all .22s}
.p-tab:hover{color:var(--t1)}
.p-tab.a{color:var(--gold2);border-bottom-color:var(--gold);font-weight:700}
.stat-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:1rem;margin-bottom:2rem}
.stat-box{background:var(--bg2);border:1px solid var(--s2);border-radius:var(--r);padding:1.1rem;text-align:center}
.stat-val{font-family:'Bebas Neue',sans-serif;font-size:2.2rem;color:var(--red3);letter-spacing:1px}
.stat-lbl{font-size:.7rem;color:var(--t3);margin-top:.15rem}
.sett-form{background:var(--bg2);border:1px solid var(--s2);border-radius:var(--r2);padding:1.8rem;max-width:550px}
.sett-form h3{font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:1px;margin-bottom:1.3rem;color:var(--t2)}

/* ADMIN */
.adm-page{padding:5.5rem 3rem 3rem;max-width:1500px;margin:0 auto}
.adm-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;flex-wrap:wrap;gap:1rem}
.adm-title{font-family:'Bebas Neue',sans-serif;font-size:1.7rem;letter-spacing:2px}
.adm-badge{background:var(--redbg);border:1px solid var(--redbr);color:var(--red3);padding:.28rem .85rem;border-radius:20px;font-size:.72rem;font-weight:700}
.adm-tabs{display:flex;gap:.4rem;flex-wrap:wrap;margin-bottom:1.5rem;border-bottom:1px solid var(--s2);padding-bottom:.8rem;overflow-x:auto;scrollbar-width:none}
.a-tab{padding:.52rem 1.2rem;background:transparent;border:1px solid var(--s2);border-radius:8px;color:var(--t3);cursor:pointer;font-size:.78rem;font-family:'Cairo',sans-serif;transition:all .22s;white-space:nowrap}
.a-tab:hover{color:var(--t1);border-color:var(--s3)}
.a-tab.a{background:var(--red);border-color:var(--red);color:#fff;font-weight:700;box-shadow:0 2px 12px rgba(229,9,20,.35)}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:1rem;margin-bottom:1.5rem}
.adm-tw{background:var(--bg2);border:1px solid var(--s2);border-radius:var(--r2);overflow:hidden}
table.at2{width:100%;border-collapse:collapse;font-size:.78rem}
table.at2 th{text-align:right;padding:.75rem 1rem;color:var(--t3);font-size:.67rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--s2);white-space:nowrap}
table.at2 td{padding:.7rem 1rem;border-bottom:1px solid var(--s1);vertical-align:middle}
table.at2 tr:last-child td{border-bottom:none}
table.at2 tr:hover td{background:rgba(255,255,255,.018)}
.a-thumb{width:38px;height:54px;object-fit:cover;border-radius:5px;background:var(--s2)}
.a-tog{padding:.27rem .6rem;border-radius:5px;font-size:.66rem;cursor:pointer;border:1px solid;font-family:'Cairo',sans-serif;transition:all .2s}
.a-tog.on{background:rgba(245,197,24,.12);border-color:rgba(245,197,24,.3);color:var(--gold)}
.a-tog.off{background:var(--s1);border-color:var(--s2);color:var(--t4)}
.a-btn{padding:.3rem .7rem;border-radius:5px;font-size:.68rem;cursor:pointer;font-family:'Cairo',sans-serif;transition:all .2s;border:1px solid;white-space:nowrap}
.a-edit{background:rgba(0,207,255,.08);border-color:rgba(0,207,255,.2);color:var(--cyan)}
.a-edit:hover{background:rgba(0,207,255,.18)}
.a-del{background:var(--redbg);border-color:var(--redbr);color:var(--red3)}
.a-del:hover{background:rgba(229,9,20,.25)}
.a-grn{background:rgba(33,197,93,.08);border-color:rgba(33,197,93,.25);color:var(--green)}
.a-grn:hover{background:rgba(33,197,93,.2)}
.form-sec{background:var(--bg2);border:1px solid var(--s2);border-radius:var(--r2);padding:1.8rem}
.form-sec h3{font-family:'Bebas Neue',sans-serif;font-size:1.05rem;letter-spacing:1px;margin-bottom:1.3rem}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
@media(max-width:580px){.form-grid{grid-template-columns:1fr}}
.form-full{grid-column:1/-1}
.ftarea{width:100%;background:var(--bg3);border:1px solid var(--s3);border-radius:10px;padding:.75rem 1rem;color:var(--t1);font-family:'Cairo',sans-serif;font-size:.88rem;outline:none;min-height:90px;resize:vertical;transition:border-color .25s;direction:rtl}
.ftarea:focus{border-color:var(--red)}
.fsel{width:100%;background:var(--bg3);border:1px solid var(--s3);border-radius:10px;padding:.75rem 1rem;color:var(--t1);font-family:'Cairo',sans-serif;font-size:.88rem;outline:none;cursor:pointer}
.fcheck-row{display:flex;gap:1.5rem;align-items:center;flex-wrap:wrap}
.fcheck{display:flex;align-items:center;gap:.4rem;cursor:pointer;font-size:.8rem;color:var(--t2)}
.fcheck input{accent-color:var(--red)}
.modal-bd{position:fixed;inset:0;z-index:2000;background:rgba(0,0,0,.88);backdrop-filter:blur(12px);display:flex;align-items:flex-start;justify-content:center;padding:3rem 1rem 2rem;overflow-y:auto}
.modal-box{background:var(--bg2);border:1px solid var(--s3);border-radius:18px;width:100%;max-width:780px;padding:1.8rem;animation:mIn .25s ease}
.modal-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.4rem}
.modal-hd h3{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:1px}
.modal-x{background:var(--s2);border:none;color:var(--t2);width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center}
.modal-x:hover{background:var(--s3)}
.confirm-box{background:var(--bg2);border:1px solid var(--s3);border-radius:16px;padding:2rem;max-width:380px;width:100%;text-align:center}
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:var(--bg2);border:1px solid var(--s3);border-radius:10px;padding:.75rem 1.4rem;font-size:.82rem;z-index:9999;box-shadow:0 8px 40px rgba(0,0,0,.8);animation:tIn .3s ease;white-space:nowrap}
@keyframes tIn{from{opacity:0;transform:translateX(-50%) translateY(12px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.toast.ok{border-color:rgba(33,197,93,.4);color:var(--green)}
.toast.err{border-color:var(--redbr);color:var(--red3)}
.spinner{width:38px;height:38px;border:3px solid var(--s2);border-top-color:var(--red);border-radius:50%;animation:sp .75s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.spin-sm{width:16px;height:16px;border:2px solid var(--s2);border-top-color:var(--gold);border-radius:50%;animation:sp .75s linear infinite;display:inline-block}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:4rem 1rem;color:var(--t3);text-align:center}
.loading-sc{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1.2rem;z-index:9999}
.loading-logo{font-family:'Bebas Neue',sans-serif;font-size:3rem;letter-spacing:4px;animation:pulse 1.6s ease infinite;background:linear-gradient(120deg,#fff,var(--red));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
@keyframes pulse{0%,100%{opacity:1;filter:drop-shadow(0 0 8px rgba(229,9,20,.4))}50%{opacity:.3;filter:drop-shadow(0 0 0px rgba(229,9,20,0))}}
.c-page{padding:5.5rem 3rem 3rem;max-width:1400px;margin:0 auto}
.c-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(158px,1fr));gap:1.1rem}
.chip{padding:.38rem .9rem;background:var(--s2);border:1px solid var(--s3);border-radius:20px;font-size:.74rem;cursor:pointer;color:var(--t2);transition:all .22s;font-family:'Cairo',sans-serif}
.chip:hover,.chip.a{background:var(--red);border-color:var(--red);color:#fff;box-shadow:0 3px 12px rgba(229,9,20,.35)}
.footer{background:var(--bg1);border-top:1px solid var(--s2);padding:3rem 3rem 1.5rem;margin-top:4rem}
.ft-grid{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:2rem;margin-bottom:2rem}
@media(max-width:720px){.ft-grid{grid-template-columns:1fr 1fr}}
.ft-logo{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;letter-spacing:3px;margin-bottom:.6rem;background:linear-gradient(120deg,#fff,var(--red));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.ft-link{display:block;font-size:.77rem;color:var(--t3);cursor:pointer;margin-bottom:.4rem;transition:color .2s}
.ft-link:hover{color:var(--t1)}
.ft-bot{display:flex;align-items:center;justify-content:space-between;padding-top:1.5rem;border-top:1px solid var(--s2);flex-wrap:wrap;gap:.5rem}
.ep-mgr{background:var(--bg3);border:1px solid var(--s2);border-radius:var(--r);margin-bottom:.5rem;overflow:hidden}
.ep-mgr-head{display:flex;align-items:center;gap:.8rem;padding:.75rem .9rem;cursor:pointer;transition:background .22s}
.ep-mgr-head:hover{background:var(--s1)}
.ep-mgr-body{padding:.75rem .9rem;border-top:1px solid var(--s2)}
.ep-url-row{display:flex;gap:.5rem;align-items:center;margin-top:.5rem}
.ep-url-row .fi{flex:1}

/* ══ MOBILE ══════════════════════════════════════════════ */
@media(max-width:768px){
  .nav{padding:.7rem 1.2rem}
  .nav-links{display:none}
  .logo{font-size:1.5rem;letter-spacing:2px}
  .hero-c{padding:3rem 1.2rem 2rem}
  .hero-title{font-size:clamp(2rem,10vw,3.5rem)}
  .hero-desc{font-size:.82rem;max-width:100%}
  .btn-play{padding:.72rem 1.4rem;font-size:.82rem}
  .btn-ol{padding:.72rem 1.2rem;font-size:.82rem}
  .row-hd{padding:.5rem 1.2rem .8rem}
  .slider{padding:.3rem 1.2rem 1rem;gap:.7rem}
  .card{width:130px}.card-img{width:130px;height:195px}
  .rank-card{width:145px}.rank-num{font-size:6rem}.rank-img{width:100px;height:150px}
  .wide-card{width:220px}.wide-img{width:220px;height:124px}
  .c-page{padding:4.5rem 1.2rem 2rem}
  .c-grid{grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:.8rem}
  .det-c{padding:1.5rem 1.2rem}
  .det-title{font-size:clamp(1.5rem,7vw,2.8rem)}
  .det-body-grid{grid-template-columns:1fr!important;padding:1.2rem!important}
  .det-sidebar{display:none}
  .player-nav{padding:.6rem 1rem}
  .player-controls-row{flex-wrap:wrap;gap:.5rem}
  .adm-page{padding:4.5rem 1rem 2rem}
  .adm-tabs{gap:.3rem}
  .a-tab{padding:.4rem .7rem;font-size:.7rem}
  .form-grid{grid-template-columns:1fr!important}

  .mob-menu-btn{display:flex!important}

}
@media(min-width:769px){
  .mob-menu-btn{display:none!important}
  .mob-nav{display:none!important}
}
/* COMMENTS */
.comments-section{margin-top:2rem;padding-top:1.5rem;border-top:1px solid var(--s2)}
.comment-item{display:flex;gap:.8rem;padding:.9rem;background:var(--bg2);border:1px solid var(--s2);border-radius:10px;margin-bottom:.6rem;position:relative;transition:border-color .2s}
.comment-item:hover{border-color:var(--s3)}
.comment-av{width:38px;height:38px;border-radius:50%;object-fit:cover;flex-shrink:0;border:2px solid var(--s3)}

/* ═══════════ DB LAYER ════════════════════════════════════ */
const DB = {
  async login(email, password) {
    const { data, error } = await sb.auth.signInWithPassword({
      email: email.trim().toLowerCase(), password
    });
    if (error) throw new Error(
      error.message.includes('Invalid') ? 'البريد أو كلمة المرور غير صحيحة' :
      error.message.includes('Email not confirmed') ? 'يرجى تأكيد البريد الإلكتروني' :
      error.message
    );
    return data;
  },
  async register(email, password, username) {
    const { data, error } = await sb.auth.signUp({
      email: email.trim().toLowerCase(), password,
      options: { data: { username, full_name: username } }
    });
    if (error) throw new Error(error.message);
    if (data.user) {
      await sb.from('profiles').upsert({
        id: data.user.id, username, full_name: username,
        avatar_url: `https://api.dicebear.com/7.x/avataaars/svg?seed=${email}`,
        is_admin: false
      });
    }
    return data;
  },
  async logout() { await sb.auth.signOut(); },
  async getProfile(uid) {
    const { data } = await sb.from('profiles').select('*').eq('id', uid).single();
    return data;
  },
  async updateProfile(uid, updates) {
    const { data, error } = await sb.from('profiles').update(updates).eq('id', uid).select().single();
    if (error) throw error;
    return data;
  },
  async changePassword(newPwd) {
    const { error } = await sb.auth.updateUser({ password: newPwd });
    if (error) throw error;
  },
  async getAllContent() {
    const { data, error } = await sb.from('content').select('*').eq('is_published', true).order('created_at', { ascending: false });
    if (error) throw error;
    return data || [];
  },
  async getContent(id) {
    const { data, error } = await sb.from('content')
      .select('*, seasons(*, episodes(*))')
      .eq('id', id).single();
    if (error) throw error;
    if (data?.seasons) {
      data.seasons.sort((a,b) => a.season_num - b.season_num);
      data.seasons.forEach(s => s.episodes?.sort((a,b) => a.ep_num - b.ep_num));
    }
    return data;
  },
  async searchContent(q) {
    const { data } = await sb.from('content').select('*')
      .or(`title.ilike.%${q}%,title_en.ilike.%${q}%,description.ilike.%${q}%`)
      .eq('is_published', true).limit(24);
    return data || [];
  },
  async createContent(payload) {
    const { data, error } = await sb.from('content').insert(payload).select().single();
    if (error) throw error;
    return data;
  },
  async updateContent(id, payload) {
    const { data, error } = await sb.from('content')
      .update({ ...payload, updated_at: new Date().toISOString() })
      .eq('id', id).select().single();
    if (error) throw error;
    return data;
  },
  async deleteContent(id) {
    const { error } = await sb.from('content').delete().eq('id', id);
    if (error) throw error;
  },
  async createSeason(contentId, title, num) {
    const { data, error } = await sb.from('seasons')
      .insert({ content_id: contentId, title, season_num: num }).select().single();
    if (error) throw error;
    return { ...data, episodes: [] };
  },
  async deleteSeason(id) {
    const { error } = await sb.from('seasons').delete().eq('id', id);
    if (error) throw error;
  },
  async createEpisode(seasonId, contentId, payload) {
    const { data, error } = await sb.from('episodes')
      .insert({ season_id: seasonId, content_id: contentId, ...payload }).select().single();
    if (error) throw error;
    return data;
  },
  async updateEpisode(id, payload) {
    const { data, error } = await sb.from('episodes')
      .update({ ...payload, updated_at: new Date().toISOString() })
      .eq('id', id).select().single();
    if (error) throw error;
    return data;
  },
  async deleteEpisode(id) {
    const { error } = await sb.from('episodes').delete().eq('id', id);
    if (error) throw error;
  },
  async getFavorites(uid) {
    const { data } = await sb.from('favorites').select('*, content(*)').eq('user_id', uid).order('created_at', { ascending: false });
    return data || [];
  },
  async toggleFavorite(uid, contentId) {
    const { data: ex } = await sb.from('favorites').select('id').eq('user_id', uid).eq('content_id', contentId).single();
    if (ex) { await sb.from('favorites').delete().eq('id', ex.id); return false; }
    await sb.from('favorites').insert({ user_id: uid, content_id: contentId });
    return true;
  },
  async getHistory(uid) {
    const { data } = await sb.from('watch_history').select('*, content(*)').eq('user_id', uid)
      .order('watched_at', { ascending: false }).limit(30);
    return data || [];
  },
  async addHistory(uid, contentId, episodeId = null) {
    try {
      await sb.from('watch_history').upsert(
        { user_id: uid, content_id: contentId, episode_id: episodeId, watched_at: new Date().toISOString() },
        { onConflict: 'user_id,content_id,episode_id' }
      );
    } catch(_) {}
  },
  // ── USERS (admin) ──
  async getAllUsers() {
    const { data, error } = await sb.from('profiles').select('*, auth_users:id(email)').order('created_at', { ascending: false });
    // fallback: just profiles
    if (error || !data) {
      const { data: d2 } = await sb.from('profiles').select('*').order('created_at', { ascending: false });
      return d2 || [];
    }
    return data;
  },
  async getUsersWithEmail() {
    // Use RPC or direct profiles table
    const { data } = await sb.from('profiles').select('*').order('created_at', { ascending: false });
    return data || [];
  },
  async toggleUserAdmin(uid, current) {
    await sb.from('profiles').update({ is_admin: !current }).eq('id', uid);
  },
  async getComments(contentId, episodeId = null) {
    let q = sb.from('comments').select('*, profiles(username, avatar_url)')
      .eq('content_id', contentId).order('created_at', { ascending: false });
    if (episodeId) q = q.eq('episode_id', episodeId);
    else q = q.is('episode_id', null);
    const { data } = await q;
    return data || [];
  },
  async addComment(uid, contentId, episodeId, text) {
    const { data, error } = await sb.from('comments')
      .insert({ user_id: uid, content_id: contentId, episode_id: episodeId || null, text })
      .select('*, profiles(username, avatar_url)').single();
    if (error) throw error;
    return data;
  },
  async deleteComment(id) {
    const { error } = await sb.from('comments').delete().eq('id', id);
    if (error) throw error;
  },
};


/* ═══════════ AUTH PAGE ══════════════════════════════════ */
function AuthPage({ onAuth }) {
  const [tab, setTab] = useState('login');
  const [f, setF] = useState({ email:'', password:'', username:'', confirm:'' });
  const [loading, setLoading] = useState(false);
  const [err, setErr] = useState('');
  const [ok, setOk] = useState('');
  const inp = (k,v) => { setF(p=>({...p,[k]:v})); setErr(''); };

  const submit = async () => {
    setErr(''); setOk('');
    if (!f.email.trim()) { setErr('يرجى إدخال البريد الإلكتروني'); return; }
    if (!f.password) { setErr('يرجى إدخال كلمة المرور'); return; }
    if (tab==='register') {
      if (!f.username.trim()) { setErr('يرجى إدخال اسم المستخدم'); return; }
      if (f.password !== f.confirm) { setErr('كلمة المرور غير متطابقة'); return; }
      if (f.password.length < 6) { setErr('كلمة المرور 6 أحرف على الأقل'); return; }
    }
    setLoading(true);
    try {
      if (tab === 'login') {
        const data = await DB.login(f.email, f.password);
        if (data?.user) { const p = await DB.getProfile(data.user.id); onAuth(data.user, p); }
        else setErr('فشل تسجيل الدخول، تحقق من بياناتك');
      } else {
        const data = await DB.register(f.email, f.password, f.username.trim());
        if (data?.user?.identities?.length === 0) { setErr('هذا البريد مسجل مسبقاً'); setLoading(false); return; }
        // Try auto-login
        try {
          const login = await DB.login(f.email, f.password);
          if (login?.user) { const p = await DB.getProfile(login.user.id); onAuth(login.user, p); }
          else setOk('تم إنشاء الحساب! يرجى تسجيل الدخول');
        } catch(_) { setOk('تم إنشاء الحساب! يرجى تسجيل الدخول الآن'); setTab('login'); }
      }
    } catch(e) { setErr(e.message || 'حدث خطأ، حاول مرة أخرى'); }
    setLoading(false);
  };

  return (
    <div style={{ minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',padding:'2rem',background:'radial-gradient(ellipse at 30% 50%,rgba(245,197,24,.05) 0%,transparent 50%),radial-gradient(ellipse at 70% 80%,rgba(229,9,20,.06) 0%,transparent 50%),var(--bg)' }}>
      <div style={{ width:'100%',maxWidth:440 }}>
        {/* Logo */}
        <div style={{ textAlign:'center',marginBottom:'2rem' }}>
          <div style={{ fontFamily:"'Bebas Neue',sans-serif",fontSize:'3rem',letterSpacing:'5px',background:'linear-gradient(135deg,#fff 0%,var(--red) 60%,#ff4444 100%)',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent',filter:'drop-shadow(0 0 15px rgba(229,9,20,.4))' }}>FLIXTN</div>
          <div style={{ fontSize:'.72rem',color:'var(--t4)',letterSpacing:'2px',marginTop:'.2rem' }}>السينما العربية والتونسية</div>
        </div>

        <div style={{ background:'rgba(19,19,31,.97)',border:'1px solid var(--s3)',borderRadius:20,padding:'2.5rem',backdropFilter:'blur(24px)',boxShadow:'0 30px 80px rgba(0,0,0,.8)' }}>
          {/* Tabs */}
          <div style={{ display:'flex',background:'var(--s1)',borderRadius:10,padding:'.25rem',marginBottom:'1.6rem' }}>
            {[['login','تسجيل الدخول'],['register','إنشاء حساب']].map(([k,l])=>(
              <button key={k} onClick={()=>{setTab(k);setErr('');setOk('');}} style={{ flex:1,padding:'.6rem',border:'none',background:tab===k?'linear-gradient(135deg,var(--gold),#d4a000)':'transparent',color:tab===k?'#000':'var(--t3)',cursor:'pointer',fontFamily:"'Cairo',sans-serif",fontSize:'.84rem',borderRadius:8,transition:'all .22s',fontWeight:tab===k?700:400 }}>{l}</button>
            ))}
          </div>

          {err && <div style={{ background:'var(--redbg)',border:'1px solid var(--redbr)',borderRadius:9,padding:'.65rem .9rem',fontSize:'.78rem',color:'var(--red3)',marginBottom:'1rem',display:'flex',alignItems:'center',gap:'.4rem' }}>⚠ {err}</div>}
          {ok && <div style={{ background:'rgba(29,185,84,.1)',border:'1px solid rgba(29,185,84,.3)',borderRadius:9,padding:'.65rem .9rem',fontSize:'.78rem',color:'var(--green)',marginBottom:'1rem' }}>✓ {ok}</div>}

          {tab==='register' && (
            <div style={{ marginBottom:'1rem' }}>
              <label style={{ display:'block',fontSize:'.68rem',color:'var(--t3)',marginBottom:'.35rem',fontWeight:700,textTransform:'uppercase',letterSpacing:'.5px' }}>اسم المستخدم</label>
              <input value={f.username} onChange={e=>inp('username',e.target.value)}
                style={{ width:'100%',background:'var(--bg3)',border:'1px solid var(--s3)',borderRadius:9,padding:'.75rem 1rem',color:'var(--t1)',fontFamily:"'Cairo',sans-serif",fontSize:'.9rem',outline:'none',direction:'rtl',transition:'border-color .25s' }}
                onFocus={e=>e.target.style.borderColor='var(--gold)'} onBlur={e=>e.target.style.borderColor='var(--s3)'}
                placeholder="اسمك هنا" />
            </div>
          )}
          <div style={{ marginBottom:'1rem' }}>
            <label style={{ display:'block',fontSize:'.68rem',color:'var(--t3)',marginBottom:'.35rem',fontWeight:700,textTransform:'uppercase',letterSpacing:'.5px' }}>البريد الإلكتروني</label>
            <input type="email" value={f.email} onChange={e=>inp('email',e.target.value)}
              style={{ width:'100%',background:'var(--bg3)',border:'1px solid var(--s3)',borderRadius:9,padding:'.75rem 1rem',color:'var(--t1)',fontFamily:"'Cairo',sans-serif",fontSize:'.9rem',outline:'none',direction:'ltr',transition:'border-color .25s' }}
              onFocus={e=>e.target.style.borderColor='var(--gold)'} onBlur={e=>e.target.style.borderColor='var(--s3)'}
              placeholder="email@example.com" onKeyDown={e=>e.key==='Enter'&&submit()} />
          </div>
          <div style={{ marginBottom:tab==='register'?'1rem':'1.4rem' }}>
            <label style={{ display:'block',fontSize:'.68rem',color:'var(--t3)',marginBottom:'.35rem',fontWeight:700,textTransform:'uppercase',letterSpacing:'.5px' }}>كلمة المرور</label>
            <input type="password" value={f.password} onChange={e=>inp('password',e.target.value)}
              style={{ width:'100%',background:'var(--bg3)',border:'1px solid var(--s3)',borderRadius:9,padding:'.75rem 1rem',color:'var(--t1)',fontFamily:"'Cairo',sans-serif",fontSize:'.9rem',outline:'none',direction:'ltr',transition:'border-color .25s' }}
              onFocus={e=>e.target.style.borderColor='var(--gold)'} onBlur={e=>e.target.style.borderColor='var(--s3)'}
              placeholder="••••••••" onKeyDown={e=>e.key==='Enter'&&submit()} />
          </div>
          {tab==='register' && (
            <div style={{ marginBottom:'1.4rem' }}>
              <label style={{ display:'block',fontSize:'.68rem',color:'var(--t3)',marginBottom:'.35rem',fontWeight:700,textTransform:'uppercase',letterSpacing:'.5px' }}>تأكيد كلمة المرور</label>
              <input type="password" value={f.confirm} onChange={e=>inp('confirm',e.target.value)}
                style={{ width:'100%',background:'var(--bg3)',border:'1px solid var(--s3)',borderRadius:9,padding:'.75rem 1rem',color:'var(--t1)',fontFamily:"'Cairo',sans-serif",fontSize:'.9rem',outline:'none',direction:'ltr',transition:'border-color .25s' }}
                onFocus={e=>e.target.style.borderColor='var(--gold)'} onBlur={e=>e.target.style.borderColor='var(--s3)'}
                placeholder="••••••••" onKeyDown={e=>e.key==='Enter'&&submit()} />
            </div>
          )}
          <button onClick={submit} disabled={loading}
            style={{ width:'100%',background:loading?'var(--s2)':'linear-gradient(135deg,var(--gold2) 0%,var(--gold) 50%,#d4a000 100%)',border:'none',color:loading?'var(--t3)':'#000',padding:'.9rem',borderRadius:10,cursor:loading?'not-allowed':'pointer',fontSize:'.92rem',fontFamily:"'Cairo',sans-serif",fontWeight:800,transition:'all .25s',boxShadow:loading?'none':'0 4px 24px rgba(245,197,24,.4)' }}>
            {loading ? <span style={{ display:'flex',alignItems:'center',justifyContent:'center',gap:'.5rem' }}><div style={{ width:16,height:16,border:'2px solid rgba(255,255,255,.3)',borderTopColor:'#fff',borderRadius:'50%',animation:'sp .75s linear infinite' }} />جاري...</span>
              : tab==='login' ? '🔐 دخول' : '✨ إنشاء الحساب'}
          </button>
        </div>
      </div>
    </div>
  );
}

/* ═══════════ COMMENTS SECTION ════════════════════════════ */
function CommentsSection({ contentId, episodeId, user, profile, isAdmin }) {
  const [comments, setComments] = useState([]);
  const [text, setText] = useState('');
  const [loading, setLoading] = useState(true);
  const [sending, setSending] = useState(false);

  useEffect(() => {
    DB.getComments(contentId, episodeId).then(d => { setComments(d); setLoading(false); }).catch(()=>setLoading(false));
  }, [contentId, episodeId]);

  const send = async () => {
    if (!text.trim() || !user) return;
    setSending(true);
    try {
      const c = await DB.addComment(user.id, contentId, episodeId, text.trim());
      // Supabase returns profiles join; if missing, fill locally
      if (!c.profiles) {
        c.profiles = {
          username: profile?.username || user.email?.split('@')[0] || 'مستخدم',
          avatar_url: profile?.avatar_url || null,
        };
      }
      setComments(p => [c, ...p]);
      setText('');
    } catch(e) { console.error(e); }
    setSending(false);
  };

  const del = async (id, uid) => {
    if (uid !== user?.id && !isAdmin) return;
    await DB.deleteComment(id);
    setComments(p => p.filter(c => c.id !== id));
  };

  return (
    <div className="comments-section">
      <div style={{ display:'flex',alignItems:'center',gap:'.6rem',marginBottom:'1.2rem' }}>
        <div style={{ width:3,height:20,background:'linear-gradient(180deg,var(--gold2),var(--gold))',borderRadius:2,boxShadow:'0 0 8px rgba(245,197,24,.5)' }} />
        <span style={{ fontFamily:"'Bebas Neue',sans-serif",fontSize:'1.1rem',letterSpacing:'2px',color:'var(--gold)' }}>التعليقات</span>
        <span style={{ fontSize:'.72rem',color:'var(--t4)',background:'var(--s2)',padding:'.15rem .5rem',borderRadius:20 }}>{comments.length}</span>
      </div>

      {user ? (
        <div className="comment-input-row">
          <img src={`https://api.dicebear.com/7.x/avataaars/svg?seed=${user.email}`} alt=""
            style={{ width:38,height:38,borderRadius:'50%',border:'2px solid var(--s3)',flexShrink:0 }} />
          <textarea className="comment-ta" value={text} onChange={e=>setText(e.target.value)}
            placeholder="اكتب تعليقك هنا..." rows={2}
            onKeyDown={e=>{ if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); send(); }}} />
          <button className="comment-send" onClick={send} disabled={sending||!text.trim()}>
            {sending ? '...' : 'إرسال'}
          </button>
        </div>
      ) : (
        <div style={{ padding:'1rem',background:'var(--bg2)',border:'1px dashed var(--s3)',borderRadius:10,fontSize:'.8rem',color:'var(--t4)',textAlign:'center',marginBottom:'1rem' }}>
          سجّل دخولك لتتمكن من التعليق
        </div>
      )}

      {loading ? <div style={{ padding:'1rem',textAlign:'center' }}><div className="spin-sm" /></div>
      : comments.length === 0 ? (
        <div style={{ padding:'1.5rem',textAlign:'center',color:'var(--t4)',fontSize:'.8rem' }}>لا توجد تعليقات بعد — كن أول من يعلّق!</div>
      ) : comments.map(c => (
        <div key={c.id} className="comment-item">
          <img className="comment-av" src={c.profiles?.avatar_url || `https://api.dicebear.com/7.x/avataaars/svg?seed=${c.user_id}`} alt="" />
          <div className="comment-body">
            <div className="comment-user">{c.profiles?.username || c.username_cache || 'مستخدم'}</div>
            <div className="comment-text">{c.text}</div>
            <div className="comment-date">{new Date(c.created_at).toLocaleDateString('ar-TN', { year:'numeric',month:'short',day:'numeric' })}</div>
          </div>
          {(c.user_id === user?.id || isAdmin) && (
            <button className="comment-del" onClick={() => del(c.id, c.user_id)} title="حذف">✕</button>
          )}
        </div>
      ))}
    </div>
  );
}

/* ═══════════ TINY COMPONENTS ════════════════════════════ */
function Toast({ msg, type = '', onClose }) {
  useEffect(() => { const t = setTimeout(onClose, 3200); return () => clearTimeout(t); }, []);
  return <div className={`toast ${type}`} onClick={onClose}>{msg}</div>;
}
function Confirm({ msg, onYes, onNo }) {
  return (
    <div className="modal-bd" onClick={e => e.target === e.currentTarget && onNo()}>
      <div className="confirm-box" style={{ marginTop: '8rem' }}>
        <div style={{ fontSize: '2.5rem', marginBottom: '.9rem' }}>⚠️</div>
        <div style={{ color: 'var(--t2)', fontSize: '.88rem', lineHeight: 1.6, marginBottom: '1.5rem' }}>{msg}</div>
        <div style={{ display: 'flex', gap: '.7rem', justifyContent: 'center' }}>
          <button onClick={onYes} style={{ padding: '.65rem 1.6rem', background: 'var(--red)', border: 'none', borderRadius: 8, color: '#fff', cursor: 'pointer', fontWeight: 700, fontFamily: "'Cairo',sans-serif" }}>تأكيد</button>
          <button onClick={onNo} style={{ padding: '.65rem 1.2rem', background: 'var(--s2)', border: '1px solid var(--s3)', borderRadius: 8, color: 'var(--t2)', cursor: 'pointer', fontFamily: "'Cairo',sans-serif" }}>إلغاء</button>
        </div>
      </div>
    </div>
  );
}
function Spin({ sm }) { return <div className={sm ? 'spin-sm' : 'spinner'} />; }


function MovieCard({ item, onClick, onFav, isFav, showType }) {
  const poster = item.poster_url || item.poster || `https://picsum.photos/seed/${item.id}/162/243`;
  return (
    <div className="card" onClick={() => onClick(item)}>
      <div className="card-wrap">

function HomePage({ movies, series, loading, onItemClick, onPlay, user, favorites, onFavToggle }) {

  const trending = all.filter(x => x.is_trending);

  const heroList = featured.length ? featured : trending.length ? trending : all;

const GENRE_MAP_EN = {'أكشن':'Action','دراما':'Drama','كوميديا':'Comedy','رعب':'Horror','رومانسي':'Romance','خيال علمي':'Sci-Fi','تشويق':'Thriller','وثائقي':'Documentary','رسوم متحركة':'Animation','مغامرة':'Adventure','جريمة':'Crime'};

function ContentListPage({ type, items, loading, onItemClick, user, favorites, onFavToggle }) {
  const [cat, setCat] = useState('الكل');

  let filtered = cat === 'الكل' ? items : items.filter(m => m.category === catMap[cat]);
  if (genre !== 'الكل') {
    filtered = filtered.filter(m => m.genre?.some(g =>
      g === genre || g === GENRE_MAP_EN[genre] || g.toLowerCase() === (GENRE_MAP_EN[genre]||'').toLowerCase()
    ));
  }
  if (sort === 'rating') filtered = [...filtered].sort((a,b) => (b.rating||0)-(a.rating||0));
  else if (sort === 'year') filtered = [...filtered].sort((a,b) => (b.year||0)-(a.year||0));
  else filtered = [...filtered].sort((a,b) => new Date(b.created_at||0)-new Date(a.created_at||0));

  return (

    </div>
  );
}

/* ═══════════ SEARCH ══════════════════════════════════════ */
function SearchOverlay({ movies, series, onItemClick, onClose }) {
  const [q, setQ] = useState('');
  const [results, setResults] = useState([]);
  const [loading, setLoading] = useState(false);
  const [filter, setFilter] = useState('all');
  const timer = useRef(null);
  const all = [...movies, ...series];

  useEffect(() => {
    if (q.length < 2) { setResults([]); return; }
    clearTimeout(timer.current);
    timer.current = setTimeout(async () => {
      setLoading(true);
      // Search locally first for speed
      const lq = q.toLowerCase();
      const local = all.filter(it =>
        it.title?.toLowerCase().includes(lq) ||
        it.title_en?.toLowerCase().includes(lq) ||
        it.description?.toLowerCase().includes(lq) ||
        it.description_en?.toLowerCase().includes(lq) ||
        it.cast_list?.some(c => c.toLowerCase().includes(lq)) ||
        it.genre?.some(g => g.toLowerCase().includes(lq)) ||
        it.director?.toLowerCase().includes(lq)
      );
      // Also search DB
      const db = await DB.searchContent(q).catch(() => []);
      // Merge deduped
      const ids = new Set(local.map(x=>x.id));
      const merged = [...local, ...db.filter(x=>!ids.has(x.id))];
      setResults(merged);
      setLoading(false);
    }, 280);
    return () => clearTimeout(timer.current);
  }, [q]);

  const filtered = filter === 'all' ? results : results.filter(r => r.type === filter);
  const trending = all.filter(x=>x.is_trending).slice(0,8);

  return (
    <div className="search-ov" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="search-box">
        {/* Search input */}
        <div className="search-field">
          <span style={{ fontSize:'1.2rem',opacity:.4 }}>🔍</span>
          <input className="search-in" autoFocus placeholder="ابحث بالعنوان، الممثل، التصنيف..." value={q} onChange={e=>setQ(e.target.value)} />
          {loading && <Spin sm />}
          <button style={{ background:'var(--s2)',border:'1px solid var(--s3)',color:'var(--t3)',width:32,height:32,borderRadius:'50%',cursor:'pointer',fontSize:'.85rem',display:'flex',alignItems:'center',justifyContent:'center' }} onClick={onClose}>✕</button>
        </div>

        {q.length >= 2 && (
          <div style={{ display:'flex',gap:'.4rem',marginBottom:'1rem' }}>
            {[['all','الكل'],['movie','أفلام'],['series','مسلسلات']].map(([k,l])=>(
              <div key={k} className={`chip ${filter===k?'a':''}`} onClick={()=>setFilter(k)} style={{ fontSize:'.72rem' }}>{l}</div>
            ))}
            {!loading && <span style={{ fontSize:'.72rem',color:'var(--t4)',marginRight:'auto',alignSelf:'center' }}>{filtered.length} نتيجة</span>}
          </div>
        )}

        {q.length < 2 ? (
          <>
            <div style={{ marginBottom:'.7rem' }}>
              <div className="s-lbl">🔥 رائج الآن</div>
              <div className="s-grid">{trending.map(it=><MovieCard key={it.id} item={it} onClick={i=>{onItemClick(i);onClose();}} showType />)}</div>
            </div>
            <div style={{ marginTop:'1.5rem' }}>
              <div className="s-lbl">📂 تصفح التصنيفات</div>
              <div style={{ display:'flex',gap:'.5rem',flexWrap:'wrap' }}>
                {GENRES.filter(g=>g!=='الكل').map(g=>(
                  <div key={g} onClick={()=>setQ(g)} style={{ padding:'.4rem .9rem',background:'var(--s2)',border:'1px solid var(--s3)',borderRadius:20,fontSize:'.74rem',cursor:'pointer',color:'var(--t2)',transition:'all .2s' }}
                    onMouseEnter={e=>{e.target.style.background='var(--red)';e.target.style.color='#fff';}}
                    onMouseLeave={e=>{e.target.style.background='var(--s2)';e.target.style.color='var(--t2)';}}>
                    {g}
                  </div>
                ))}
              </div>
            </div>
          </>
        ) : filtered.length === 0 && !loading ? (
          <div className="empty">
            <div style={{ fontSize:'3rem',opacity:.15,marginBottom:'.8rem' }}>🔍</div>
            <div style={{ color:'var(--t4)',fontSize:'.85rem' }}>لا توجد نتائج لـ "{q}"</div>
            <div style={{ fontSize:'.72rem',color:'var(--t4)',marginTop:'.3rem' }}>جرب كلمة أخرى</div>
          </div>
        ) : (
          <div className="s-grid">{filtered.map(it=><MovieCard key={it.id} item={it} onClick={i=>{onItemClick(i);onClose();}} showType />)}</div>
        )}
      </div>
    </div>
  );
}

/* ═══════════ PROFILE PAGE ════════════════════════════════ */
function ProfilePage({ user, profile, onLogout, onProfileUpdate, movies, series }) {
  const [tab, setTab] = useState('history');
  const [favs, setFavs] = useState([]);
  const [hist, setHist] = useState([]);
  const [loadingData, setLoadingData] = useState(true);
  const [saving, setSaving] = useState(false);
  const [toast, setToast] = useState('');
  const [editF, setEditF] = useState({ username: profile?.username||'', full_name: profile?.full_name||'' });
  const [pwdF, setPwdF] = useState({ new:'', confirm:'' });
  const [pwdErr, setPwdErr] = useState('');
  const showToast = m => { setToast(m); setTimeout(()=>setToast(''),3000); };

  useEffect(() => {
    Promise.all([DB.getFavorites(user.id), DB.getHistory(user.id)])
      .then(([f,h]) => { setFavs(f); setHist(h); setLoadingData(false); });
  }, [user.id]);

  const saveProfile = async () => {
    setSaving(true);
    try { const u = await DB.updateProfile(user.id, editF); onProfileUpdate(u); showToast('✓ تم الحفظ'); }
    catch { showToast('حدث خطأ'); }
    setSaving(false);
  };
  const changePwd = async () => {
    setPwdErr('');
    if (pwdF.new !== pwdF.confirm) { setPwdErr('كلمات المرور غير متطابقة'); return; }
    if (pwdF.new.length < 6) { setPwdErr('6 أحرف على الأقل'); return; }
    setSaving(true);
    try { await DB.changePassword(pwdF.new); setPwdF({new:'',confirm:''}); showToast('✓ تم تغيير كلمة المرور'); }
    catch (e) { setPwdErr(e.message); }
    setSaving(false);
  };

  return (
    <div className="prof-page">
      {toast && <Toast msg={toast} type="ok" onClose={()=>setToast('')} />}
      <div className="prof-cover">
        <div style={{ position:'absolute',inset:0,background:'linear-gradient(135deg,rgba(229,9,20,.3) 0%,transparent 60%)' }} />
        <div className="prof-av-wrap">

          <button key={k} className={`p-tab ${tab===k?'a':''}`} onClick={()=>setTab(k)}>{l}</button>

      {tab==='settings' && (

          <div className="fg"><label className="fl">الاسم الكامل</label><input className="fi fi-r" value={editF.full_name} onChange={e=>setEditF(p=>({...p,full_name:e.target.value}))} /></div>
          <div className="fg"><label className="fl">البريد الإلكتروني</label><input className="fi" value={user.email} disabled style={{opacity:.5}} /></div>
          <button className="btn-auth" onClick={saveProfile} disabled={saving}>{saving?<span style={{display:'flex',alignItems:'center',justifyContent:'center',gap:'.4rem'}}><Spin sm />جاري...</span>:'💾 حفظ'}</button>
